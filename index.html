<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA PALIFICUP — Classement Officiel</title>
<style>
:root{
  --navy:#071423;--navy-hdr:#0d2037;--navy-alt:#0a1826;--navy-card:#112040;
  --blue-lt:#88b0d8;--blue-med:#4a78a8;--accent:#2a7fc0;--blue-bright:#3a8bd4;
  --gold:#ffd040;--silver:#c8c8d0;--bronze:#cc7a3a;--white:#ffffff;
  --text-dim:#567090;--green:#22c55e;--red:#ef4444;--separator:#122a44;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--navy);color:var(--white);font-family:'Segoe UI','Helvetica Neue',Arial,sans-serif;min-height:100vh;}

/* HEADER */
.site-header{background:var(--navy-hdr);border-bottom:3px solid var(--accent);padding:0 24px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;height:64px;}
.logo{display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;}
.logo-img{height:44px;object-fit:contain;}
.logo-fallback{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),#e8a000);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:var(--navy);}
.logo-text{line-height:1.1;}
.logo-title{font-size:18px;font-weight:800;letter-spacing:2px;color:var(--white);}
.logo-sub{font-size:10px;color:var(--blue-lt);letter-spacing:3px;text-transform:uppercase;}
.header-actions{display:flex;gap:10px;align-items:center;}
.admin-badge{font-size:11px;background:var(--gold);color:var(--navy);border-radius:4px;padding:2px 8px;font-weight:700;display:none;}
.btn{padding:7px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:all .18s;}
.btn-ghost{background:transparent;color:var(--blue-lt);border:1px solid var(--separator);}
.btn-ghost:hover{background:var(--navy-card);color:var(--white);}
.btn-primary{background:var(--accent);color:var(--white);}
.btn-primary:hover{background:#2070b0;}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-gold:hover{background:#e8c030;}
.btn-danger{background:#7f1d1d;color:#fca5a5;border:1px solid #991b1b;}
.btn-danger:hover{background:#991b1b;}
.btn-sm{padding:4px 10px;font-size:12px;}

/* STATS BAND */
.stats-band{background:var(--navy-card);border-bottom:1px solid var(--separator);padding:12px 24px;display:flex;gap:28px;align-items:center;flex-wrap:wrap;}
.stat-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.stat-val{font-size:22px;font-weight:800;color:var(--white);line-height:1;}
.stat-val.gold{color:var(--gold);}
.stat-val.silver{color:var(--silver);}
.stat-val.bronze{color:var(--bronze);}
.stat-lbl{font-size:10px;color:var(--text-dim);letter-spacing:1.5px;text-transform:uppercase;}
.stats-divider{width:1px;height:36px;background:var(--separator);}

/* TOOLBAR */
.toolbar{padding:16px 24px 12px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.search-wrap{flex:1;min-width:200px;max-width:380px;position:relative;}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-dim);}
.search-input{width:100%;padding:9px 12px 9px 34px;background:var(--navy-card);border:1px solid var(--separator);border-radius:8px;color:var(--white);font-size:14px;outline:none;transition:border .18s;}
.search-input::placeholder{color:var(--text-dim);}
.search-input:focus{border-color:var(--accent);}
.results-count{font-size:12px;color:var(--text-dim);margin-left:auto;}

/* TABLE */
.table-wrap{padding:0 24px 40px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:14px;min-width:600px;}
thead tr{background:var(--navy-hdr);border-bottom:2px solid var(--accent);}
thead th{padding:10px 12px;text-align:left;font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--blue-lt);cursor:pointer;user-select:none;white-space:nowrap;}
thead th:hover{color:var(--white);}
thead th.sorted{color:var(--gold);}
tbody tr{border-bottom:1px solid var(--separator);cursor:pointer;transition:background .15s;}
tbody tr:hover{background:var(--navy-card);}
tbody tr.fadeIn{animation:fadeIn .3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
td{padding:10px 12px;vertical-align:middle;}

/* COLS */
.td-rank{width:60px;font-size:13px;font-weight:700;color:var(--text-dim);}
.td-rank .rank-num{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;font-size:13px;}
.rank-1{background:rgba(255,208,64,.2);color:var(--gold);border:1.5px solid var(--gold);}
.rank-2{background:rgba(200,200,208,.12);color:var(--silver);border:1.5px solid var(--silver);}
.rank-3{background:rgba(204,122,58,.18);color:var(--bronze);border:1.5px solid var(--bronze);}
.td-name{font-weight:600;color:var(--white);}
.td-name .name-link{color:inherit;text-decoration:none;}
.td-name .name-link:hover{color:var(--blue-bright);}
.td-trn{width:90px;text-align:center;}
.trn-badge{display:inline-flex;align-items:center;gap:4px;background:var(--navy-hdr);border:1px solid var(--separator);border-radius:20px;padding:3px 10px;font-size:12px;font-weight:600;color:var(--blue-lt);}
.td-pts{width:140px;}
.pts-wrap{display:flex;flex-direction:column;gap:3px;}
.pts-badge{display:flex;align-items:baseline;gap:3px;}
.pts-num{font-size:18px;font-weight:800;color:var(--white);}
.pts-lbl{font-size:10px;font-weight:700;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;}
.pts-bar-wrap{height:4px;background:var(--separator);border-radius:2px;overflow:hidden;}
.pts-bar{height:100%;background:linear-gradient(90deg,var(--accent),var(--blue-bright));border-radius:2px;transition:width .4s ease;}
.td-total{width:100px;text-align:center;}
.total-badge{display:inline-flex;flex-direction:column;align-items:center;}
.total-num{font-size:15px;font-weight:700;color:var(--blue-lt);}
.total-same{font-size:13px;color:var(--text-dim);}
.total-lbl{font-size:9px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;}
.td-actions{width:90px;text-align:right;}
td.td-actions{display:none;}

/* ADMIN ROW */
.admin-actions-visible td.td-actions{display:table-cell;}
.action-btn{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:4px;font-size:14px;transition:background .15s;}
.action-btn:hover{background:var(--navy-card);}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:var(--navy-hdr);border:1px solid var(--separator);border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;animation:slideUp .25s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:none;}}
.modal-header{padding:20px 24px 14px;border-bottom:1px solid var(--separator);}
.modal-title{font-size:20px;font-weight:800;color:var(--white);}
.modal-subtitle{font-size:13px;color:var(--blue-lt);margin-top:4px;display:flex;gap:16px;flex-wrap:wrap;}
.modal-subtitle span{display:flex;align-items:center;gap:4px;}
.modal-body{padding:20px 24px;overflow-y:auto;}
.modal-close{position:absolute;top:16px;right:20px;background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer;}
.modal-close:hover{color:var(--white);}
.modal-header{position:relative;}

/* HISTORY TABLE */
.hist-table{width:100%;border-collapse:collapse;margin-top:4px;}
.hist-table th{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-dim);padding:6px 10px;border-bottom:1px solid var(--separator);text-align:left;}
.hist-table td{padding:10px 10px;border-bottom:1px solid var(--separator);font-size:14px;}
.hist-table tr:last-child td{border-bottom:none;}
.hist-trn-name{font-weight:700;color:var(--white);}
.result-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.res-gold{background:rgba(255,208,64,.18);color:var(--gold);border:1px solid rgba(255,208,64,.35);}
.res-silver{background:rgba(200,200,208,.14);color:var(--silver);border:1px solid rgba(200,200,208,.28);}
.res-bronze{background:rgba(204,122,58,.18);color:var(--bronze);border:1px solid rgba(204,122,58,.3);}
.res-blue{background:rgba(42,127,192,.15);color:var(--blue-bright);border:1px solid rgba(42,127,192,.3);}
.res-default{background:var(--navy-card);color:var(--blue-lt);border:1px solid var(--separator);}
.hist-pts{font-size:15px;font-weight:800;color:var(--white);}
.hist-pts span{font-size:10px;color:var(--text-dim);}
.no-history{color:var(--text-dim);font-size:14px;padding:20px 0;text-align:center;}

/* FORM MODAL */
.form-group{margin-bottom:16px;}
.form-label{font-size:12px;font-weight:700;color:var(--blue-lt);letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;display:block;}
.form-input{width:100%;padding:9px 12px;background:var(--navy);border:1px solid var(--separator);border-radius:6px;color:var(--white);font-size:14px;outline:none;}
.form-input:focus{border-color:var(--accent);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}

/* ADMIN PANEL */
.admin-panel{background:rgba(255,208,64,.06);border:1px solid rgba(255,208,64,.2);border-radius:8px;padding:12px 16px;margin:0 24px 16px;display:none;align-items:center;gap:12px;flex-wrap:wrap;}
.admin-panel.visible{display:flex;}
.admin-panel-label{font-size:12px;font-weight:700;color:var(--gold);letter-spacing:1px;text-transform:uppercase;}

/* EMPTY */
.empty-state{text-align:center;padding:60px 24px;color:var(--text-dim);}
.empty-state h3{font-size:18px;margin-bottom:8px;color:var(--blue-lt);}

/* MEDAL ICONS */
.medal{margin-right:2px;}

@media(max-width:600px){
  .stats-band{gap:16px;}
  .stat-val{font-size:18px;}
  .toolbar{padding:12px 16px;}
  .table-wrap{padding:0 8px 40px;}
  td,th{padding:8px 8px;}
  .pts-num{font-size:15px;}
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="logo" id="logoBtn" aria-label="Logo Palificup">
    <img class="logo-img" id="logoImg" src="palif png.png" alt="Palificup" onerror="this.style.display='none';document.getElementById('logoFallback').style.display='flex'">
    <div class="logo-fallback" id="logoFallback" style="display:none">P</div>
    <div class="logo-text">
      <div class="logo-title">PALIFICUP</div>
      <div class="logo-sub">Classement Officiel</div>
    </div>
  </div>
  <div class="header-actions">
    <span class="admin-badge" id="adminBadge">⚡ ADMIN</span>
    <button class="btn btn-ghost" id="exportBtn">⬇ Export CSV</button>
  </div>
</header>

<!-- STATS BAND -->
<div class="stats-band" id="statsBand"></div>

<!-- ADMIN PANEL -->
<div class="admin-panel" id="adminPanel">
  <span class="admin-panel-label">🔧 Mode Admin</span>
  <button class="btn btn-gold btn-sm" id="addPlayerBtn">+ Ajouter joueur</button>
  <button class="btn btn-ghost btn-sm" id="logoutBtn">Déconnexion</button>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" id="searchInput" type="text" placeholder="Rechercher un joueur…" autocomplete="off">
  </div>
  <span class="results-count" id="resultsCount"></span>
</div>

<!-- TABLE -->
<div class="table-wrap" id="tableWrap">
  <table id="rankTable">
    <thead>
      <tr>
        <th class="td-rank" data-col="rank">RANG <span class="sort-arrow">↕</span></th>
        <th class="td-name" data-col="name">JOUEUR <span class="sort-arrow">↕</span></th>
        <th class="td-trn" data-col="tournaments">TOURNOIS <span class="sort-arrow">↕</span></th>
        <th class="td-pts sorted" data-col="points">TOP 3 <span class="sort-arrow">↓</span></th>
        <th class="td-total" data-col="totalAll">TOTAL <span class="sort-arrow">↕</span></th>
        <th class="td-actions"></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
  <div class="empty-state" id="emptyState" style="display:none">
    <h3>Aucun joueur trouvé</h3>
    <p>Essayez un autre nom.</p>
  </div>
</div>

<!-- HISTORY MODAL -->
<div class="modal-overlay" id="histModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="histName">—</div>
      <div class="modal-subtitle" id="histSubtitle"></div>
      <button class="modal-close" id="histClose">✕</button>
    </div>
    <div class="modal-body">
      <div id="histContent"></div>
    </div>
  </div>
</div>

<!-- EDIT / ADD MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="editModalTitle">Joueur</div>
      <button class="modal-close" id="editClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Nom du joueur</label>
        <input class="form-input" id="editName" type="text" placeholder="Prénom Nom">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Points TOP 3</label>
          <input class="form-input" id="editPoints" type="number" min="0" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">Total tous tournois</label>
          <input class="form-input" id="editTotalAll" type="number" min="0" placeholder="0">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Nombre de tournois joués</label>
        <input class="form-input" id="editTournaments" type="number" min="0" max="10" placeholder="0">
      </div>
      <div class="form-actions">
        <button class="btn btn-ghost" id="editCancel">Annuler</button>
        <button class="btn btn-primary" id="editSave">Enregistrer</button>
      </div>
    </div>
  </div>
</div>

<!-- PASSWORD MODAL -->
<div class="modal-overlay" id="pwdModal">
  <div class="modal" style="max-width:340px;">
    <div class="modal-header">
      <div class="modal-title">Accès Admin</div>
      <button class="modal-close" id="pwdClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input class="form-input" id="pwdInput" type="password" placeholder="••••••••">
        <p id="pwdError" style="color:var(--red);font-size:12px;margin-top:6px;display:none">Mot de passe incorrect.</p>
      </div>
      <div class="form-actions">
        <button class="btn btn-gold" id="pwdSubmit">Connexion</button>
      </div>
    </div>
  </div>
</div>

// ─── STATE ────────────────────────────────────────────────────────────────────
let players       = [];
let isAdmin       = false;
let sortCol       = 'points';
let sortDir       = 'desc';
let searchQuery   = '';
let logoClickCount= 0;
let logoClickTimer= null;
let editingIdx    = null;

// ─── INIT ─────────────────────────────────────────────────────────────────────
function loadData(){
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){
    try{ players = JSON.parse(saved); }catch(e){ players = INITIAL_DATA.map(p=>({...p,history:p.history||[]})); }
  } else {
    players = INITIAL_DATA.map(p=>({...p,history:p.history||[]}));
  }
}
function saveData(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(players)); }

function recalcRanks(){
  const sorted = [...players].sort((a,b)=>b.points-a.points||a.name.localeCompare(b.name));
  let rank=1;
  for(let i=0;i<sorted.length;i++){
    if(i>0 && sorted[i].points<sorted[i-1].points) rank=i+1;
    const p = players.find(x=>x===sorted[i]);
    if(p) p.rank=rank;
  }
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function getResultClass(result){
  const r=(result||'').toLowerCase();
  if(r.includes('vainqueur')) return 'res-gold';
  if(r.startsWith('finaliste')) return 'res-silver';
  if(r.includes('finale rep')) return 'res-blue';
  if(r.includes('demi')) return 'res-bronze';
  return 'res-default';
}

function renderStats(){
  recalcRanks();
  const top3 = [...players].sort((a,b)=>b.points-a.points).slice(0,3);
  const medals=['🥇','🥈','🥉'];
  const colors=['gold','silver','bronze'];
  const sb=document.getElementById('statsBand');
  let html=`<div class="stat-item"><div class="stat-val">${players.length}</div><div class="stat-lbl">Joueurs</div></div>
            <div class="stats-divider"></div>`;
  top3.forEach((p,i)=>{
    html+=`<div class="stat-item">
      <div class="stat-val ${colors[i]}">${medals[i]} ${p.name.split(' ')[0]}</div>
      <div class="stat-lbl">${p.points} pts (TOP 3)</div>
    </div>`;
    if(i<2) html+=`<div class="stats-divider"></div>`;
  });
  sb.innerHTML=html;
}

function renderTable(){
  recalcRanks();
  let data=[...players];

  // search
  if(searchQuery){
    const q=searchQuery.toLowerCase();
    data=data.filter(p=>p.name.toLowerCase().includes(q));
  }

  // sort
  data.sort((a,b)=>{
    let va=a[sortCol], vb=b[sortCol];
    if(sortCol==='name'){ va=va.toLowerCase(); vb=vb.toLowerCase(); }
    if(sortDir==='asc') return va>vb?1:va<vb?-1:0;
    return va<vb?1:va>vb?-1:0;
  });

  const tbody=document.getElementById('tableBody');
  const empty=document.getElementById('emptyState');
  const cnt=document.getElementById('resultsCount');

  if(data.length===0){
    tbody.innerHTML='';
    empty.style.display='block';
    cnt.textContent='Aucun résultat';
    return;
  }
  empty.style.display='none';
  cnt.textContent=`${data.length} joueur${data.length>1?'s':''}`;

  const maxPts=Math.max(...players.map(p=>p.points),1);

  tbody.innerHTML=data.map(p=>{
    const barW=Math.round((p.points/maxPts)*100);
    const rankClass=p.rank===1?'rank-1':p.rank===2?'rank-2':p.rank===3?'rank-3':'';
    const idx=players.indexOf(p);
    const diffTotal = p.totalAll!==p.points;
    return `<tr class="fadeIn" data-idx="${idx}" onclick="openHistory(${idx})">
      <td class="td-rank"><span class="rank-num ${rankClass}">${p.rank}</span></td>
      <td class="td-name">${p.name}</td>
      <td class="td-trn"><span class="trn-badge">🎮 ${p.tournaments}</span></td>
      <td class="td-pts">
        <div class="pts-wrap">
          <div class="pts-badge"><span class="pts-num">${p.points}</span><span class="pts-lbl">PTS</span></div>
          <div class="pts-bar-wrap"><div class="pts-bar" style="width:${barW}%"></div></div>
        </div>
      </td>
      <td class="td-total">
        <div class="total-badge">
          ${diffTotal
            ? `<span class="total-num">${p.totalAll}</span><span class="total-lbl">tous</span>`
            : `<span class="total-same">${p.totalAll}</span>`}
        </div>
      </td>
      <td class="td-actions">
        <button class="action-btn" title="Modifier" onclick="event.stopPropagation();openEdit(${idx})">✏️</button>
        <button class="action-btn" title="Supprimer" onclick="event.stopPropagation();deletePlayer(${idx})">🗑️</button>
      </td>
    </tr>`;
  }).join('');
}

// ─── HISTORY MODAL ────────────────────────────────────────────────────────────
function openHistory(idx){
  const p=players[idx];
  if(!p) return;
  document.getElementById('histName').textContent=p.name;

  const diffTotal = p.totalAll!==p.points;
  let subtitle=`<span>🏆 Rang #${p.rank}</span>
    <span>⭐ TOP 3 : <strong>${p.points} pts</strong></span>`;
  if(diffTotal) subtitle+=`<span>📊 Total : <strong>${p.totalAll} pts</strong></span>`;
  subtitle+=`<span>🎮 ${p.tournaments} tournoi${p.tournaments>1?'s':''}</span>`;
  document.getElementById('histSubtitle').innerHTML=subtitle;

  const hist=p.history||[];
  let html='';
  if(hist.length===0){
    html=`<p class="no-history">Aucun historique disponible pour ce joueur.</p>`;
  } else {
    html=`<table class="hist-table">
      <thead><tr>
        <th>Tournoi</th>
        <th>Résultat</th>
        <th style="text-align:right">Points</th>
      </tr></thead>
      <tbody>`;
    hist.forEach(h=>{
      const trn=TOURNAMENTS.find(t=>t.id===h.tournamentId)||{name:h.tournamentId};
      const cls=getResultClass(h.result);
      html+=`<tr>
        <td class="hist-trn-name">${trn.name}</td>
        <td><span class="result-badge ${cls}">${h.result}</span></td>
        <td style="text-align:right"><span class="hist-pts">${h.points} <span>pts</span></span></td>
      </tr>`;
    });
    html+=`</tbody></table>`;

    if(diffTotal){
      html+=`<div style="margin-top:14px;padding:10px 14px;background:var(--navy-card);border-radius:8px;border:1px solid var(--separator);font-size:13px;">
        <span style="color:var(--text-dim)">Total tous tournois :</span>
        <strong style="color:var(--blue-lt);margin-left:6px">${p.totalAll} pts</strong>
        <span style="color:var(--text-dim);margin-left:6px">— Score officiel (TOP 3) :</span>
        <strong style="color:var(--white);margin-left:6px">${p.points} pts</strong>
      </div>`;
    }
  }

  document.getElementById('histContent').innerHTML=html;
  document.getElementById('histModal').classList.add('open');
}

// ─── EDIT / ADD ───────────────────────────────────────────────────────────────
function openEdit(idx){
  if(!isAdmin) return;
  editingIdx=idx;
  const p=players[idx];
  document.getElementById('editModalTitle').textContent='Modifier '+p.name;
  document.getElementById('editName').value=p.name;
  document.getElementById('editPoints').value=p.points;
  document.getElementById('editTotalAll').value=p.totalAll;
  document.getElementById('editTournaments').value=p.tournaments;
  document.getElementById('editModal').classList.add('open');
}
function openAdd(){
  editingIdx=null;
  document.getElementById('editModalTitle').textContent='Ajouter un joueur';
  document.getElementById('editName').value='';
  document.getElementById('editPoints').value='';
  document.getElementById('editTotalAll').value='';
  document.getElementById('editTournaments').value='';
  document.getElementById('editModal').classList.add('open');
}
function saveEdit(){
  const name=document.getElementById('editName').value.trim();
  const pts=parseInt(document.getElementById('editPoints').value)||0;
  const total=parseInt(document.getElementById('editTotalAll').value)||pts;
  const trn=parseInt(document.getElementById('editTournaments').value)||0;
  if(!name) return;
  if(editingIdx!==null){
    players[editingIdx].name=name;
    players[editingIdx].points=pts;
    players[editingIdx].totalAll=total;
    players[editingIdx].tournaments=trn;
  } else {
    players.push({name,points:pts,totalAll:total,tournaments:trn,rank:0,history:[]});
  }
  saveData(); renderStats(); renderTable();
  document.getElementById('editModal').classList.remove('open');
}
function deletePlayer(idx){
  if(!isAdmin) return;
  if(!confirm(`Supprimer ${players[idx].name} ?`)) return;
  players.splice(idx,1);
  saveData(); renderStats(); renderTable();
}

// ─── ADMIN ────────────────────────────────────────────────────────────────────
function setAdmin(val){
  isAdmin=val;
  document.getElementById('adminBadge').style.display=val?'inline':'none';
  document.getElementById('adminPanel').classList.toggle('visible',val);
  document.getElementById('rankTable').classList.toggle('admin-actions-visible',val);
}
function checkPassword(){
  const v=document.getElementById('pwdInput').value;
  if(v===ADMIN_PASSWORD){
    document.getElementById('pwdModal').classList.remove('open');
    document.getElementById('pwdInput').value='';
    document.getElementById('pwdError').style.display='none';
    setAdmin(true);
  } else {
    document.getElementById('pwdError').style.display='block';
  }
}

// ─── EXPORT ───────────────────────────────────────────────────────────────────
function exportCSV(){
  recalcRanks();
  const sorted=[...players].sort((a,b)=>a.rank-b.rank||a.name.localeCompare(b.name));
  let csv='Rang,Joueur,Tournois,Points TOP3,Total Tous\n';
  sorted.forEach(p=>{
    csv+=`${p.rank},"${p.name}",${p.tournaments},${p.points},${p.totalAll}\n`;
  });
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);
  a.download='palificup_classement.csv';
  a.click();
}

// ─── SORTING ──────────────────────────────────────────────────────────────────
function initSorting(){
  document.querySelectorAll('thead th[data-col]').forEach(th=>{
    th.addEventListener('click',()=>{
      const col=th.dataset.col;
      if(col===sortCol) sortDir=sortDir==='desc'?'asc':'desc';
      else { sortCol=col; sortDir=col==='name'?'asc':'desc'; }
      document.querySelectorAll('thead th').forEach(t=>{
        t.classList.remove('sorted');
        const arr=t.querySelector('.sort-arrow');
        if(arr) arr.textContent='↕';
      });
      th.classList.add('sorted');
      const arr=th.querySelector('.sort-arrow');
      if(arr) arr.textContent=sortDir==='desc'?'↓':'↑';
      renderTable();
    });
  });
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
document.getElementById('histClose').addEventListener('click',()=>document.getElementById('histModal').classList.remove('open'));
document.getElementById('histModal').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');});
document.getElementById('editClose').addEventListener('click',()=>document.getElementById('editModal').classList.remove('open'));
document.getElementById('editCancel').addEventListener('click',()=>document.getElementById('editModal').classList.remove('open'));
document.getElementById('editSave').addEventListener('click',saveEdit);
document.getElementById('editModal').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');});
document.getElementById('pwdClose').addEventListener('click',()=>{document.getElementById('pwdModal').classList.remove('open');document.getElementById('pwdError').style.display='none';});
document.getElementById('pwdSubmit').addEventListener('click',checkPassword);
document.getElementById('pwdInput').addEventListener('keydown',e=>{if(e.key==='Enter')checkPassword();});
document.getElementById('pwdModal').addEventListener('click',e=>{if(e.target===e.currentTarget)e.currentTarget.classList.remove('open');});
document.getElementById('exportBtn').addEventListener('click',exportCSV);
document.getElementById('addPlayerBtn').addEventListener('click',openAdd);
document.getElementById('logoutBtn').addEventListener('click',()=>setAdmin(false));
document.getElementById('searchInput').addEventListener('input',e=>{
  searchQuery=e.target.value.trim();
  renderTable();
});
document.getElementById('logoBtn').addEventListener('click',()=>{
  logoClickCount++;
  clearTimeout(logoClickTimer);
  if(logoClickCount>=5){
    logoClickCount=0;
    if(!isAdmin) document.getElementById('pwdModal').classList.add('open');
  } else {
    logoClickTimer=setTimeout(()=>{ logoClickCount=0; },1500);
  }
});

// ─── BOOT ─────────────────────────────────────────────────────────────────────
loadData();
renderStats();
initSorting();
renderTable();
</script>
