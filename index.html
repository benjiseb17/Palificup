<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA PALIFICUP — Classement Officiel</title>
<style>
  /* =====================================================================
     COULEURS — modifie ces valeurs pour changer tout le thème du site.
     Utilise https://htmlcolorcodes.com/fr/ pour trouver un code couleur.
     ===================================================================== */
  :root {
   /* -- Fonds -------------------------------------------------- */
--navy:       #FDF5EC;   /* fond principal — blanc crème chaud       */
--navy-hdr:   #FFF8F0;   /* header — blanc très légèrement orangé    */
--navy-row:   #FFF1E0;   /* lignes impaires — crème doux             */
--navy-alt:   #FFFFFF;   /* lignes paires — blanc pur                */
--navy-card:  #FDE8D0;   /* cartes — pêche très clair                */

/* -- Textes secondaires ------------------------------------- */
--blue-lt:    #C05A00;   /* labels, sous-titres — orange foncé       */
--blue-med:   #A04500;   /* rang 4+ — brun orangé                    */
--blue-bright:#FF7A00;   /* barre progression — orange vif           */
--accent:     #E85500;   /* accent principal — orange Perudo         */

/* -- Médailles ---------------------------------------------- */
--gold:       #E6AC00;   /* or — légèrement assombri pour le clair   */
--silver:     #909090;   /* argent — gris moyen lisible              */
--bronze:     #A0622A;   /* bronze cuivré                            */

/* -- Textes ------------------------------------------------- */
--white:      #1A0800;   /* texte principal — brun très foncé        */
--text-dim:   #9A6A40;   /* texte discret — caramel moyen            */

/* -- Actions ------------------------------------------------ */
--green:      #1A9E4A;   /* hausse — vert foncé lisible sur clair    */
--red:        #CC2020;   /* baisse / supprimer — rouge foncé         */
--separator:  #F0D0B0;   /* bordures — beige orangé discret          */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ─────────────────────────────────────────── */
  .site-header {
    background: var(--navy-hdr);
    border-bottom: 3px solid var(--accent);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 70px;
  }
  .logo { display: flex; align-items: center; gap: 14px; }
  .logo-img {
    height: 54px;
    width: auto;
    object-fit: contain;
    border-radius: 6px;
  }
  .logo-fallback {
    width: 54px; height: 54px;
    background: linear-gradient(135deg, var(--gold), #e8a000);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
  }
  .logo-text { line-height: 1.2; }
  .logo-title { font-size: 18px; font-weight: 800; letter-spacing: 2px; color: var(--white); }
  .logo-sub   { font-size: 10px; color: var(--blue-lt); letter-spacing: 3px; text-transform: uppercase; }

  .header-actions { display: flex; gap: 8px; align-items: center; }
  /* ── RESULT BADGE COLORS ─────────────────────────────── */
  .btn {
    padding: 7px 16px; border-radius: 6px; font-size: 13px;
    font-weight: 600; cursor: pointer; border: none;
    transition: all .18s; letter-spacing: .3px;
  }
  .btn-ghost {
    background: transparent; color: var(--blue-lt);
    border: 1px solid var(--separator);
  }
  .btn-ghost:hover { background: var(--navy-card); color: var(--white); }
  .btn-primary { background: var(--accent); color: var(--white); }
  .btn-primary:hover { background: #2070b0; }
  .btn-gold { background: var(--gold); color: var(--navy); }
  .btn-gold:hover { background: #e8c030; }
  .btn-danger { background: #7f1d1d; color: #fca5a5; border: 1px solid #991b1b; }
  .btn-danger:hover { background: #991b1b; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-admin-active {
    background: rgba(255,208,64,.15); color: var(--gold);
    border: 1px solid rgba(255,208,64,.4);
  }
  .btn-admin-active:hover { background: rgba(255,208,64,.25); }

  /* ── STATS BAND ──────────────────────────────────────── */
  .stats-band {
    background: var(--navy-card);
    border-bottom: 1px solid var(--separator);
    padding: 12px 24px;
    display: flex; gap: 32px; align-items: center; flex-wrap: wrap;
  }
  .stat-item { display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .stat-val { font-size: 22px; font-weight: 800; color: var(--white); line-height: 1; }
  .stat-val.gold   { color: var(--gold); }
  .stat-val.silver { color: var(--silver); }
  .stat-val.bronze { color: var(--bronze); }
  .stat-lbl { font-size: 10px; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; }
  .stats-divider { width: 1px; height: 36px; background: var(--separator); }

  /* ── TOOLBAR ─────────────────────────────────────────── */
  .toolbar {
    padding: 16px 24px 12px;
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  }
  .search-wrap {
    flex: 1; min-width: 200px; max-width: 440px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--text-dim);
  }
  .search-input {
    width: 100%; padding: 9px 12px 9px 34px;
    background: var(--navy-card); border: 1px solid var(--separator);
    border-radius: 8px; color: var(--white); font-size: 14px;
    outline: none; transition: border .18s;
  }
  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus { border-color: var(--accent); }
  .results-count { font-size: 12px; color: var(--text-dim); margin-left: auto; }

  /* ── TABLE ───────────────────────────────────────────── */
  .table-wrap { padding: 0 24px 32px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  thead tr {
    background: var(--navy-hdr);
    border-bottom: 2px solid var(--accent);
  }
  thead th {
    padding: 10px 12px; text-align: left;
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--blue-lt);
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  thead th:hover { color: var(--white); }
  thead th .sort-arrow { margin-left: 4px; opacity: .4; }
  thead th.sorted .sort-arrow { opacity: 1; color: var(--gold); }

  tbody tr {
    border-bottom: 1px solid var(--separator);
    transition: background .12s;
    cursor: pointer;
  }
  tbody tr:nth-child(odd)  { background: var(--navy); }
  tbody tr:nth-child(even) { background: var(--navy-alt); }
  tbody tr:hover { background: var(--navy-card) !important; }
  tbody tr.top1 { background: rgba(255,208,64,.05) !important; }
  tbody tr.top2 { background: rgba(200,200,208,.04) !important; }
  tbody tr.top3 { background: rgba(204,122,58,.04) !important; }

  td { padding: 9px 12px; vertical-align: middle; }

  .td-rank { width: 60px; text-align: center; }
  .rank-num {
    font-size: 18px; font-weight: 900;
    font-family: 'Arial Black', Arial, sans-serif; line-height: 1;
  }
  .rank-1 { color: var(--gold); }
  .rank-2 { color: var(--silver); }
  .rank-3 { color: var(--bronze); }
  .rank-other { color: var(--blue-med); }

  .td-player { min-width: 200px; }
  .player-cell { display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; color: #fff; flex-shrink: 0;
  }
  .player-names { line-height: 1.2; }
  .player-first { font-size: 12px; color: var(--blue-lt); }
  .player-last  { font-size: 14px; font-weight: 700; color: var(--white); }

  /* tournois column */
  .td-t { width: 110px; text-align: center; }
  .tourn-pill {
    display: inline-flex; align-items: center; gap: 5px;
    background: var(--separator); color: var(--blue-lt);
    font-size: 12px; font-weight: 700;
    border-radius: 12px; padding: 4px 10px;
  }
  .tourn-pill span { font-size: 14px; color: var(--white); }

  .td-pts { width: 120px; }
  .pts-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: #0d2037; border: 1px solid var(--separator);
    border-radius: 6px; padding: 4px 10px;
  }
  .pts-num { font-size: 15px; font-weight: 800; color: var(--white); }
  .pts-lbl { font-size: 10px; color: var(--text-dim); font-weight: 600; }
  .pts-bar-wrap { height: 3px; background: var(--separator); border-radius: 2px; margin-top: 3px; width: 100%; max-width: 90px; }
  .pts-bar { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--blue-bright)); }

  .td-actions { width: 90px; text-align: right; }

  /* ── MODAL BASE ──────────────────────────────────────── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.75); z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--navy-hdr); border: 1px solid var(--accent);
    border-radius: 14px; padding: 28px 32px;
    width: min(520px, 95vw); position: relative;
    max-height: 90vh; overflow-y: auto;
  }
  .modal-title {
    font-size: 16px; font-weight: 800; letter-spacing: 1px;
    margin-bottom: 20px; color: var(--gold);
  }
  .form-row { margin-bottom: 16px; }
  .form-label {
    display: block; font-size: 11px; font-weight: 700;
    color: var(--blue-lt); letter-spacing: 1px; text-transform: uppercase;
    margin-bottom: 6px;
  }
  .form-input {
    width: 100%; padding: 10px 14px;
    background: var(--navy); border: 1px solid var(--separator);
    border-radius: 8px; color: var(--white); font-size: 14px;
    outline: none; transition: border .18s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
  .modal-close {
    position: absolute; top: 14px; right: 16px;
    background: none; border: none; cursor: pointer;
    color: var(--text-dim); font-size: 20px; line-height: 1;
  }
  .modal-close:hover { color: var(--white); }

  /* ── HISTORY MODAL ───────────────────────────────────── */
  .history-header {
    display: flex; align-items: center; gap: 14px; margin-bottom: 20px;
  }
  .history-avatar {
    width: 50px; height: 50px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800; color: #fff; flex-shrink: 0;
  }
  .history-player-info { flex: 1; }
  .history-player-name { font-size: 18px; font-weight: 800; color: var(--white); }
  .history-player-sub  { font-size: 12px; color: var(--blue-lt); margin-top: 2px; }
  .history-rank-badge {
    font-size: 28px; font-weight: 900; font-family: 'Arial Black', Arial, sans-serif;
    line-height: 1;
  }

  .history-table {
    width: 100%; border-collapse: collapse; margin-top: 4px; font-size: 13px;
  }
  .history-table thead tr { background: var(--navy); border-bottom: 2px solid var(--accent); }
  .history-table thead th {
    padding: 8px 10px; text-align: left; font-size: 10px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase; color: var(--blue-lt);
  }
  .history-table tbody tr { border-bottom: 1px solid var(--separator); }
  .history-table tbody tr:hover { background: var(--navy-card); }
  .history-table td { padding: 9px 10px; }
  .pos-badge {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 12px; font-weight: 700;
  }
  .pos-1 { background: rgba(255,208,64,.2); color: var(--gold); }
  .pos-2 { background: rgba(200,200,208,.15); color: var(--silver); }
  .pos-3 { background: rgba(204,122,58,.2); color: var(--bronze); }
  .pos-other { background: var(--separator); color: var(--blue-lt); }

  .history-empty {
    text-align: center; padding: 32px 0;
    color: var(--text-dim); font-size: 13px;
  }
  .history-empty .icon { font-size: 32px; margin-bottom: 8px; }

  .history-divider {
    height: 1px; background: var(--separator); margin: 18px 0;
  }

  /* ── ADD RESULT FORM (admin) ─────────────────────────── */
  .add-result-section { margin-top: 4px; }
  .add-result-title {
    font-size: 11px; font-weight: 700; color: var(--blue-lt);
    letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 12px;
  }
  .add-result-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }
  .add-result-grid .form-row { margin-bottom: 0; }

  /* ── NOTIFICATION ─────────────────────────────────────── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--navy-card); border: 1px solid var(--accent);
    border-radius: 8px; padding: 12px 20px;
    font-size: 13px; color: var(--white);
    z-index: 999; transform: translateY(80px); opacity: 0;
    transition: all .3s; max-width: 320px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  .empty-row td {
    text-align: center; padding: 40px;
    color: var(--text-dim); font-size: 14px;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--navy); }
  ::-webkit-scrollbar-thumb { background: var(--separator); border-radius: 3px; }

  @media (max-width: 640px) {
    .stats-band { gap: 16px; }
    .td-t { display: none; }
    td, th { padding: 8px 8px; }
    .toolbar { padding: 12px 12px 8px; }
    .table-wrap { padding: 0 8px 24px; }
    .site-header { padding: 0 12px; }
    .logo-title { font-size: 15px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="logo">
    <img src="logo.png" class="logo-img" alt="Palificup" id="logoImg"
         onerror="this.style.display='none';document.getElementById('logoFallback').style.display='flex'">
    <div class="logo-fallback" id="logoFallback" style="display:none">🎲</div>
    <div class="logo-text">
      <div class="logo-title">LA PALIFICUP</div>
      <div class="logo-sub">Classement Officiel</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" id="adminBtn" onclick="promptAdmin()" title="Accès administrateur">🔒</button>
  </div>
</header>

<!-- STATS BAND -->
<div class="stats-band" id="statsBand"></div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input class="search-input" id="searchInput" placeholder="Rechercher un joueur…" />
  </div>
  <span class="results-count" id="resultsCount"></span>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <table id="rankTable">
    <thead>
      <tr>
        <th class="td-rank"    data-col="rank">RANG <span class="sort-arrow">▼</span></th>
        <th class="td-player"  data-col="name">JOUEUR <span class="sort-arrow">↕</span></th>
        <th class="td-t"       data-col="tournaments">TOURNOIS <span class="sort-arrow">↕</span></th>
        <th class="td-pts"     data-col="points">POINTS <span class="sort-arrow">↕</span></th>
        <th class="td-actions" id="thActions"></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <button class="modal-close" id="closeModal">×</button>
    <div class="modal-title" id="editModalTitle">Modifier le joueur</div>
    <div class="form-row">
      <label class="form-label">Nom complet</label>
      <input class="form-input" id="editName" />
    </div>
    <div class="form-row">
      <label class="form-label">Points</label>
      <input class="form-input" id="editPoints" type="number" min="0" />
    </div>
    <div class="form-row">
      <label class="form-label">Tournois joués</label>
      <input class="form-input" id="editTournaments" type="number" min="0" />
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" id="cancelEdit">Annuler</button>
      <button class="btn btn-primary" id="confirmEdit">Enregistrer</button>
    </div>
  </div>
</div>

<!-- HISTORY MODAL -->
<div class="modal-overlay" id="historyModal">
  <div class="modal">
    <button class="modal-close" id="closeHistory">×</button>
    <div class="history-header" id="historyHeader"></div>
    <div id="historyContent"></div>
    <!-- Admin: add result form -->
    <div id="addResultSection" style="display:none">
      <div class="history-divider"></div>
      <div class="add-result-section">
        <div class="add-result-title">+ Ajouter un résultat</div>
        <div class="add-result-grid">
          <div class="form-row">
            <label class="form-label">Tournoi</label>
            <input class="form-input" id="resTournament" placeholder="ex: Tournoi #3" />
          </div>
          <div class="form-row">
            <label class="form-label">Date</label>
            <input class="form-input" id="resDate" type="date" />
          </div>
          <div class="form-row">
            <label class="form-label">Résultat</label>
            <input class="form-input" id="resPosition" placeholder="ex: Demi, Finaliste…" />
          </div>
          <div class="form-row">
            <label class="form-label">Points gagnés</label>
            <input class="form-input" id="resPoints" type="number" min="0" placeholder="ex: 90" />
          </div>
        </div>
        <div style="margin-top:12px; text-align:right">
          <button class="btn btn-primary" id="confirmAddResult">Ajouter le résultat</button>
        </div>
      </div>
    </div>
    <!-- Admin: add player form -->
    <div id="addPlayerInHistory" style="display:none">
      <div class="history-divider"></div>
      <div class="add-result-section">
        <div class="add-result-title">+ Ajouter un joueur</div>
        <div class="add-result-grid">
          <div class="form-row" style="grid-column:span 2">
            <label class="form-label">Nom complet</label>
            <input class="form-input" id="newPlayerName" placeholder="ex: Prénom NOM" />
          </div>
          <div class="form-row">
            <label class="form-label">Points</label>
            <input class="form-input" id="newPlayerPoints" type="number" min="0" placeholder="0" />
          </div>
          <div class="form-row">
            <label class="form-label">Tournois</label>
            <input class="form-input" id="newPlayerTournaments" type="number" min="0" placeholder="0" />
          </div>
        </div>
        <div style="margin-top:12px; text-align:right">
          <button class="btn btn-primary" id="confirmNewPlayer">Ajouter au classement</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// =====================================================================
// DONNÉES DU CLASSEMENT

// et change "points" ou "tournaments".
// Format de chaque joueur : {"rank":X, "name":"Prénom Nom", "points":X, "tournaments":X}

// ── RANK RECALCULATION ────────────────────────────────────────────────────────
// Recalcule les rangs après une modification : trie par points décroissants,
// attribue le même rang aux joueurs à égalité de points.
function recalcRanks() {
  const sorted = [...players].sort((a,b) => b.points - a.points || a.name.localeCompare(b.name));
  let rank = 1;
  for (let i = 0; i < sorted.length; i++) {
    if (i > 0 && sorted[i].points < sorted[i-1].points) rank = i + 1;
    sorted[i].rank = rank;
  }
  const rankMap = new Map(sorted.map(p => [p._id, p.rank]));
  players = players.map(p => ({ ...p, rank: rankMap.get(p._id) }));
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function updateStats() {
  const sorted = [...players].sort((a,b) => a.rank - b.rank || a.name.localeCompare(b.name));
  const top3 = sorted.slice(0,3);
  const totalPts = players.reduce((s,p) => s+p.points, 0);
  const totalT   = players.reduce((s,p) => s+p.tournaments, 0);
  const band = document.getElementById('statsBand');
  const medal = ['gold','silver','bronze'];
  band.innerHTML = `
    ${top3.map((p,i) => `
      <div class="stat-item">
        <div class="stat-val ${medal[i]}">${p.name.split(' ').pop().toUpperCase()}</div>
        <div class="stat-lbl">${['🥇 1er','🥈 2e','🥉 3e'][i]} · ${p.points} pts</div>
      </div>
      <div class="stats-divider"></div>
    `).join('')}
    <div class="stat-item">
      <div class="stat-val">${players.length}</div>
      <div class="stat-lbl">Joueurs</div>
    </div>
    <div class="stats-divider"></div>
    <div class="stat-item">
      <div class="stat-val">${totalT}</div>
      <div class="stat-lbl">Participations</div>
    </div>
  `;
}

// ── RENDER TABLE ──────────────────────────────────────────────────────────────
// getFiltered() : applique la recherche et le tri, retourne la liste filtrée.
// renderTable() : génère le HTML de chaque ligne du tableau.
function getFiltered() {
  let list = [...players];
  if (searchQuery) {
    const q = searchQuery.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    list = list.filter(p => p.name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').includes(q));
  }
  list.sort((a,b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    return sortDir * (va < vb ? -1 : va > vb ? 1 : 0);
  });
  return list;
}

    const adminActions = adminMode ? `
      <td class="td-actions" onclick="event.stopPropagation()">
        <button class="btn btn-ghost btn-sm" onclick="openEdit(${p._id})">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deletePlayer(${p._id})" style="margin-left:4px">✕</button>
      </td>` : `<td class="td-actions"></td>`;

    return `<tr class="${rowClass}" data-id="${p._id}" onclick="openHistory(${p._id})">
      <td class="td-rank"><span class="rank-num ${rankClass}">${p.rank}</span></td>
      <td class="td-player">
        <div class="player-cell">
          <div class="avatar" style="background:${col}">${initials}</div>
          <div class="player-names">
            <div class="player-first">${firstName}</div>
            <div class="player-last">${lastName || firstName.toUpperCase()}</div>
          </div>
        </div>
      </td>
      <td class="td-t">
        <span class="tourn-pill">
          <span>${p.tournaments}</span> tournoi${p.tournaments > 1 ? 's' : ''}
        </span>
      </td>
      <td class="td-pts">
        <div class="pts-badge">
          <span class="pts-num">${p.points}</span>
          <span class="pts-lbl">PTS</span>
        </div>
        <div class="pts-bar-wrap"><div class="pts-bar" style="width:${barW}%"></div></div>
      </td>
      ${adminActions}
    </tr>`;
  }).join('');
}

function refresh() {
  recalcRanks();
  updateStats();
  renderTable();
  updateSortHeaders();
}

// ── SORT ──────────────────────────────────────────────────────────────────────
function updateSortHeaders() {
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    const col = th.dataset.col;
    th.classList.toggle('sorted', col === sortCol);
    const arrow = th.querySelector('.sort-arrow');
    if (arrow) arrow.textContent = (col === sortCol) ? (sortDir === 1 ? '▲' : '▼') : '↕';
  });
}
document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = 1; }
    renderTable(); updateSortHeaders();
  });
});

// ── SEARCH ────────────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderTable();
});

// ── RESULT BADGE STYLE ───────────────────────────────────────────────────────
// Détermine la couleur du badge selon le résultat :
//   "vainqueur"  → or   | "finaliste" (sans repêchage) → argent
//   "demi"       → bronze | tout le reste → bleu
// Si tu ajoutes de nouveaux résultats, adapte ces règles ici.
function resultBadgeClass(r) {
  if (!r) return 'pos-other';
  const up = r.toLowerCase();
  if (up.includes('vainqueur')) return 'pos-1';
  if (up.includes('finaliste') && !up.includes('repê') && !up.includes('repe')) return 'pos-2';
  if (up.includes('demi') && !up.includes('repê') && !up.includes('repe')) return 'pos-3';
  return 'pos-other';
}

// ── HISTORY MODAL ─────────────────────────────────────────────────────────────
// S'ouvre quand on clique sur une ligne du tableau.
// Affiche le résumé du joueur + le tableau de ses résultats par tournoi.
// En mode admin, un formulaire permet d'ajouter de nouveaux résultats.
function openHistory(id) {
  const p = players.find(x => x._id === id);
  if (!p) return;
  historyPlayerId = id;

  const idx = players.indexOf(p);
  const col = getAvatarColor(idx);
  const rankClass = p.rank === 1 ? 'rank-1' : p.rank === 2 ? 'rank-2' : p.rank === 3 ? 'rank-3' : 'rank-other';
  const parts = p.name.trim().split(' ');
  const firstName = parts[0];
  const lastName  = parts.slice(1).join(' ').toUpperCase() || firstName.toUpperCase();

  document.getElementById('historyHeader').innerHTML = `
    <div class="history-avatar" style="background:${col}">${getInitials(p.name)}</div>
    <div class="history-player-info">
      <div class="history-player-name">${firstName} ${lastName}</div>
      <div class="history-player-sub">${p.points} pts · ${p.tournaments} tournoi${p.tournaments>1?'s':''}</div>
    </div>
    <div class="history-rank-badge ${rankClass}">#${p.rank}</div>
  `;

  renderHistoryTable(id);
  document.getElementById('addResultSection').style.display = adminMode ? 'block' : 'none';
  document.getElementById('addPlayerInHistory').style.display = 'none';
  document.getElementById('historyModal').classList.add('open');
}

function getPlayerHistory(id) {
  const p = players.find(x => x._id === id);
  if (!p) return [];
  const excel = EXCEL_HISTORY[p.name] || [];
  const extra = extraHistory[id] || [];
  return [...excel, ...extra];
}

function renderHistoryTable(id) {
  const history = getPlayerHistory(id);
  const container = document.getElementById('historyContent');

  if (!history.length) {
    container.innerHTML = `
      <div class="history-empty">
        <div class="icon">🎲</div>
        <div>Aucun historique de tournoi disponible</div>
      </div>`;
    return;
  }

  const totalPts = history.reduce((s,r) => s + (r.p || r.points || 0), 0);
  const wins = history.filter(r => (r.r||r.resultat||'').toLowerCase().includes('vainqueur')).length;

  container.innerHTML = `
    <div style="display:flex;gap:20px;margin-bottom:16px;flex-wrap:wrap">
      <div class="stat-item">
        <div class="stat-val gold">${totalPts}</div>
        <div class="stat-lbl">Total points</div>
      </div>
      <div class="stat-item">
        <div class="stat-val">${history.length}</div>
        <div class="stat-lbl">Tournois joués</div>
      </div>
      ${wins ? `<div class="stat-item">
        <div class="stat-val gold">🏆 ${wins}</div>
        <div class="stat-lbl">Victoire${wins>1?'s':''}</div>
      </div>` : ''}
    </div>
    <table class="history-table">
      <thead>
        <tr>
          <th>Tournoi</th>
          <th>Résultat</th>
          <th>Points</th>
          ${adminMode ? '<th></th>' : ''}
        </tr>
      </thead>
      <tbody>
        ${history.map((r, i) => {
          const resultat = r.r || r.resultat || '—';
          const pts      = r.p || r.points || 0;
          const tournoi  = r.t || r.tournament || '—';
          const badgeClass = resultBadgeClass(resultat);
          const deleteBtn  = adminMode && r.isExtra
            ? `<td><button class="btn btn-danger btn-sm" onclick="deleteExtraResult(${id},${i})">✕</button></td>`
            : adminMode ? '<td></td>' : '';
          return `<tr>
            <td style="font-weight:700;color:var(--gold)">${tournoi}</td>
            <td><span class="pos-badge ${badgeClass}">${resultat}</span></td>
            <td><strong>${pts}</strong> pts</td>
            ${deleteBtn}
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  `;
}

function deleteExtraResult(playerId, index) {
  if (!adminMode) return;
  if (!confirm('Supprimer ce résultat ?')) return;
  // index is in combined array — offset by excel history length
  const excelLen = (EXCEL_HISTORY[players.find(x=>x._id===playerId)?.name]||[]).length;
  const extraIdx = index - excelLen;
  if (extraIdx >= 0 && extraHistory[playerId]) {
    extraHistory[playerId].splice(extraIdx, 1);
    renderHistoryTable(playerId);
    toast('Résultat supprimé');
  }
}

function closeHistory() {
  historyPlayerId = null;
  document.getElementById('historyModal').classList.remove('open');
}
document.getElementById('closeHistory').onclick = closeHistory;
document.getElementById('historyModal').addEventListener('click', e => {
  if (e.target === document.getElementById('historyModal')) closeHistory();
});

// Add result
document.getElementById('confirmAddResult').onclick = () => {
  if (!adminMode || historyPlayerId === null) return;
  const tournament = document.getElementById('resTournament').value.trim();
  const resultat   = document.getElementById('resPosition').value.trim();
  const points     = parseInt(document.getElementById('resPoints').value) || 0;
  if (!tournament) { toast('⚠️ Entrez le nom du tournoi'); return; }
  if (!extraHistory[historyPlayerId]) extraHistory[historyPlayerId] = [];
  extraHistory[historyPlayerId].push({ t: tournament, r: resultat, p: points, isExtra: true });
  document.getElementById('resTournament').value = '';
  document.getElementById('resPosition').value = '';
  document.getElementById('resPoints').value = '';
  renderHistoryTable(historyPlayerId);
  toast('✅ Résultat ajouté');
};

// ── EDIT MODAL ────────────────────────────────────────────────────────────────
// Permet à l'admin de modifier le nom, les points et le nombre de tournois
// d'un joueur. Accessible uniquement en mode admin via le bouton ✏️.
function openEdit(id) {
  if (!adminMode) return;
  const p = players.find(x => x._id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('editModalTitle').textContent = `Modifier — ${p.name}`;
  document.getElementById('editName').value = p.name;
  document.getElementById('editPoints').value = p.points;
  document.getElementById('editTournaments').value = p.tournaments;
  document.getElementById('editModal').classList.add('open');
}
function closeEdit() {
  editingId = null;
  document.getElementById('editModal').classList.remove('open');
}
document.getElementById('closeModal').onclick = closeEdit;
document.getElementById('cancelEdit').onclick = closeEdit;
document.getElementById('editModal').addEventListener('click', e => {
  if (e.target === document.getElementById('editModal')) closeEdit();
});
document.getElementById('confirmEdit').onclick = () => {
  const name   = document.getElementById('editName').value.trim();
  const pts    = parseInt(document.getElementById('editPoints').value) || 0;
  const tourns = parseInt(document.getElementById('editTournaments').value) || 0;
  if (!name) { toast('⚠️ Le nom ne peut pas être vide'); return; }
  players = players.map(p => p._id === editingId ? { ...p, name, points: pts, tournaments: tourns } : p);
  closeEdit();
  refresh();
  toast('✅ Joueur modifié avec succès');
};

// ── DELETE ────────────────────────────────────────────────────────────────────
// Supprime un joueur après confirmation. Admin uniquement (bouton ✕).
function deletePlayer(id) {
  if (!adminMode) return;
  const p = players.find(x => x._id === id);
  if (!p) return;
  if (!confirm(`Supprimer "${p.name}" du classement ?`)) return;
  players = players.filter(x => x._id !== id);
  delete extraHistory[id];
  refresh();
  toast(`🗑️ ${p.name} supprimé`);
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
// Affiche une notification temporaire en bas à droite (disparaît après 2,8s).
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
// La touche Échap ferme toutes les fenêtres ouvertes.
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeEdit(); closeHistory(); }
});

// ── INIT ──────────────────────────────────────────────────────────────────────
// Lance le site : calcule les rangs, affiche les stats et remplit le tableau.
refresh();
</script>
</body>
</html>
