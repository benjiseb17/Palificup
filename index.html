<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA PALIFICUP — Classement Officiel</title>
<style>
  :root {
    --navy:       #071423;
    --navy-hdr:   #0d2037;
    --navy-row:   #0c1d30;
    --navy-alt:   #0a1826;
    --navy-card:  #112040;
    --blue-lt:    #88b0d8;
    --blue-med:   #4a78a8;
    --blue-bright:#3a8bd4;
    --accent:     #2a7fc0;
    --gold:       #ffd040;
    --silver:     #c8c8d0;
    --bronze:     #cc7a3a;
    --white:      #ffffff;
    --text-dim:   #567090;
    --green:      #22c55e;
    --red:        #ef4444;
    --separator:  #122a44;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ─────────────────────────────────────────── */
  .site-header {
    background: var(--navy-hdr);
    border-bottom: 3px solid var(--accent);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--gold), #e8a000);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 900; color: var(--navy);
    letter-spacing: -1px;
  }
  .logo-text { line-height: 1.1; }
  .logo-title { font-size: 18px; font-weight: 800; letter-spacing: 2px; color: var(--white); }
  .logo-sub   { font-size: 10px; color: var(--blue-lt); letter-spacing: 3px; text-transform: uppercase; }

  .header-actions { display: flex; gap: 10px; align-items: center; }
  .btn {
    padding: 7px 16px; border-radius: 6px; font-size: 13px;
    font-weight: 600; cursor: pointer; border: none;
    transition: all .18s; letter-spacing: .3px;
  }
  .btn-ghost {
    background: transparent; color: var(--blue-lt);
    border: 1px solid var(--separator);
  }
  .btn-ghost:hover { background: var(--navy-card); color: var(--white); }
  .btn-primary { background: var(--accent); color: var(--white); }
  .btn-primary:hover { background: #2070b0; }
  .btn-gold { background: var(--gold); color: var(--navy); }
  .btn-gold:hover { background: #e8c030; }
  .btn-danger { background: #7f1d1d; color: #fca5a5; border: 1px solid #991b1b; }
  .btn-danger:hover { background: #991b1b; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }

  /* ── STATS BAND ──────────────────────────────────────── */
  .stats-band {
    background: var(--navy-card);
    border-bottom: 1px solid var(--separator);
    padding: 12px 24px;
    display: flex; gap: 32px; align-items: center; flex-wrap: wrap;
  }
  .stat-item { display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .stat-val { font-size: 22px; font-weight: 800; color: var(--white); line-height: 1; }
  .stat-val.gold   { color: var(--gold); }
  .stat-val.silver { color: var(--silver); }
  .stat-val.bronze { color: var(--bronze); }
  .stat-lbl { font-size: 10px; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; }

  .stats-divider { width: 1px; height: 36px; background: var(--separator); }

  /* ── CHART SECTION ───────────────────────────────────── */
  .chart-section {
    padding: 20px 24px 0;
    display: none;
  }
  .chart-section.visible { display: block; }
  .chart-title {
    font-size: 13px; font-weight: 700; color: var(--blue-lt);
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px;
  }
  .chart-wrap {
    background: var(--navy-card);
    border: 1px solid var(--separator);
    border-radius: 10px;
    padding: 18px;
    margin-bottom: 20px;
  }
  .chart-bars { display: flex; align-items: flex-end; gap: 8px; height: 160px; }
  .chart-bar-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
  .chart-bar {
    width: 100%; border-radius: 4px 4px 0 0;
    transition: height .3s;
    cursor: pointer;
    position: relative;
  }
  .chart-bar:hover { filter: brightness(1.3); }
  .chart-bar-val {
    font-size: 10px; font-weight: 700; color: var(--white);
    position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
    white-space: nowrap;
  }
  .chart-bar-name {
    font-size: 9px; color: var(--blue-lt); text-align: center;
    max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ── TOOLBAR ─────────────────────────────────────────── */
  .toolbar {
    padding: 16px 24px 12px;
    display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  }
  .search-wrap {
    flex: 1; min-width: 200px; max-width: 380px;
    position: relative;
  }
  .search-wrap svg {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--text-dim);
  }
  .search-input {
    width: 100%; padding: 9px 12px 9px 34px;
    background: var(--navy-card); border: 1px solid var(--separator);
    border-radius: 8px; color: var(--white); font-size: 14px;
    outline: none; transition: border .18s;
  }
  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus { border-color: var(--accent); }

  .filter-pts {
    display: flex; gap: 6px;
  }
  .filter-btn {
    padding: 7px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1px solid var(--separator);
    background: var(--navy-card); color: var(--blue-lt);
    transition: all .18s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--accent); color: var(--white); border-color: var(--accent);
  }

  .sort-label { font-size: 12px; color: var(--text-dim); white-space: nowrap; }

  .results-count {
    font-size: 12px; color: var(--text-dim); margin-left: auto;
  }

  /* ── TABLE ───────────────────────────────────────────── */
  .table-wrap { padding: 0 24px 32px; }

  table {
    width: 100%; border-collapse: collapse;
    font-size: 14px;
  }
  thead tr {
    background: var(--navy-hdr);
    border-bottom: 2px solid var(--accent);
  }
  thead th {
    padding: 10px 12px; text-align: left;
    font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--blue-lt);
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  thead th:hover { color: var(--white); }
  thead th .sort-arrow { margin-left: 4px; opacity: .4; }
  thead th.sorted .sort-arrow { opacity: 1; color: var(--gold); }

  tbody tr {
    border-bottom: 1px solid var(--separator);
    transition: background .12s;
  }
  tbody tr:nth-child(odd)  { background: var(--navy); }
  tbody tr:nth-child(even) { background: var(--navy-alt); }
  tbody tr:hover { background: var(--navy-card) !important; }
  tbody tr.top1 { background: rgba(255,208,64,.05) !important; }
  tbody tr.top2 { background: rgba(200,200,208,.04) !important; }
  tbody tr.top3 { background: rgba(204,122,58,.04) !important; }

  td { padding: 9px 12px; vertical-align: middle; }

  /* rank cell */
  .td-rank { width: 60px; text-align: center; }
  .rank-num {
    font-size: 18px; font-weight: 900;
    font-family: 'Arial Black', Arial, sans-serif;
    line-height: 1;
  }
  .rank-1 { color: var(--gold); }
  .rank-2 { color: var(--silver); }
  .rank-3 { color: var(--bronze); }
  .rank-other { color: var(--blue-med); }

  /* change cell */
  .td-change { width: 40px; text-align: center; }
  .change-badge {
    display: inline-flex; align-items: center; gap: 2px;
    font-size: 11px; font-weight: 700;
    padding: 2px 5px; border-radius: 4px;
  }
  .change-up   { background: rgba(34,197,94,.15); color: var(--green); }
  .change-dn   { background: rgba(239,68,68,.15); color: var(--red); }
  .change-same { color: var(--text-dim); font-size: 14px; }

  /* avatar cell */
  .td-player { min-width: 220px; }
  .player-cell { display: flex; align-items: center; gap: 12px; }
  .avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; color: #fff;
    flex-shrink: 0;
  }
  .player-names { line-height: 1.2; }
  .player-first { font-size: 12px; color: var(--blue-lt); }
  .player-last  { font-size: 14px; font-weight: 700; color: var(--white); }

  /* points cell */
  .td-pts { width: 120px; }
  .pts-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: #0d2037; border: 1px solid var(--separator);
    border-radius: 6px; padding: 4px 10px;
  }
  .pts-num { font-size: 15px; font-weight: 800; color: var(--white); }
  .pts-lbl { font-size: 10px; color: var(--text-dim); font-weight: 600; }

  /* tournament cell */
  .td-t { width: 60px; text-align: center; }
  .tourn-pill {
    background: var(--separator); color: var(--blue-lt);
    font-size: 11px; font-weight: 700;
    border-radius: 12px; padding: 2px 8px;
    display: inline-block;
  }

  /* actions cell */
  .td-actions { width: 90px; text-align: right; }

  /* ── MODAL / EDIT PANEL ──────────────────────────────── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.7); z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--navy-hdr);
    border: 1px solid var(--accent);
    border-radius: 12px; padding: 28px 32px;
    width: min(480px, 95vw);
    position: relative;
  }
  .modal-title {
    font-size: 16px; font-weight: 800; letter-spacing: 1px;
    margin-bottom: 20px; color: var(--gold);
  }
  .form-row { margin-bottom: 16px; }
  .form-label {
    display: block; font-size: 11px; font-weight: 700;
    color: var(--blue-lt); letter-spacing: 1px; text-transform: uppercase;
    margin-bottom: 6px;
  }
  .form-input {
    width: 100%; padding: 10px 14px;
    background: var(--navy); border: 1px solid var(--separator);
    border-radius: 8px; color: var(--white); font-size: 14px;
    outline: none; transition: border .18s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
  .modal-close {
    position: absolute; top: 14px; right: 16px;
    background: none; border: none; cursor: pointer;
    color: var(--text-dim); font-size: 20px; line-height: 1;
  }
  .modal-close:hover { color: var(--white); }

  /* ── ADD PLAYER FORM ─────────────────────────────────── */
  .add-section {
    padding: 0 24px 20px;
    display: none;
  }
  .add-section.visible {
    display: block;
  }
  .add-card {
    background: var(--navy-card);
    border: 1px dashed var(--accent);
    border-radius: 10px;
    padding: 20px 24px;
  }
  .add-card-title {
    font-size: 13px; font-weight: 700; letter-spacing: 1px;
    color: var(--blue-lt); margin-bottom: 16px; text-transform: uppercase;
  }
  .add-form-row {
    display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end;
  }
  .add-form-row .form-row { flex: 1; min-width: 140px; margin-bottom: 0; }

  /* ── PROGRESS BAR (bar below points) ────────────────── */
  .pts-bar-wrap { height: 3px; background: var(--separator); border-radius: 2px; margin-top: 3px; width: 100%; max-width: 90px; }
  .pts-bar { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--blue-bright)); }

  /* ── NOTIFICATION ────────────────────────────────────── */
  .toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--navy-card); border: 1px solid var(--accent);
    border-radius: 8px; padding: 12px 20px;
    font-size: 13px; color: var(--white);
    z-index: 999; transform: translateY(80px); opacity: 0;
    transition: all .3s;
    max-width: 320px;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* ── EMPTY STATE ─────────────────────────────────────── */
  .empty-row td {
    text-align: center; padding: 40px;
    color: var(--text-dim); font-size: 14px;
  }

  /* ── SCROLLBAR ───────────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--navy); }
  ::-webkit-scrollbar-thumb { background: var(--separator); border-radius: 3px; }

  @media (max-width: 640px) {
    .stats-band { gap: 16px; }
    .td-change, .td-t { display: none; }
    td, th { padding: 8px 8px; }
    .toolbar { padding: 12px 12px 8px; }
    .table-wrap { padding: 0 8px 24px; }
    .site-header { padding: 0 12px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="logo">
    <div class="logo-icon">P</div>
    <div class="logo-text">
      <div class="logo-title">LA PALIFICUP</div>
      <div class="logo-sub">Classement Officiel · Saison 2024-2025</div>
    </div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" id="toggleChart">📊 Graphique</button>
    <button class="btn btn-ghost" id="toggleAdd">+ Joueur</button>
    <button class="btn btn-gold" id="exportBtn">⬇ Export CSV</button>
  </div>
</header>

<!-- STATS BAND -->
<div class="stats-band" id="statsBand"></div>

<!-- CHART SECTION -->
<div class="chart-section" id="chartSection">
  <div class="chart-title">Top 10 — Points</div>
  <div class="chart-wrap">
    <div class="chart-bars" id="chartBars"></div>
  </div>
</div>

<!-- ADD PLAYER SECTION -->
<div class="add-section" id="addSection">
  <div class="add-card">
    <div class="add-card-title">Ajouter un joueur</div>
    <div class="add-form-row">
      <div class="form-row">
        <label class="form-label">Nom complet</label>
        <input class="form-input" id="addName" placeholder="ex: Prénom Nom" />
      </div>
      <div class="form-row">
        <label class="form-label">Points</label>
        <input class="form-input" id="addPoints" type="number" placeholder="ex: 90" min="0" />
      </div>
      <div class="form-row">
        <label class="form-label">Tournois</label>
        <input class="form-input" id="addTournaments" type="number" placeholder="ex: 2" min="0" />
      </div>
      <div class="form-row" style="min-width:auto">
        <label class="form-label">&nbsp;</label>
        <button class="btn btn-primary" id="addConfirm">Ajouter</button>
      </div>
    </div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input class="search-input" id="searchInput" placeholder="Rechercher un joueur…" />
  </div>
  <div class="filter-pts">
    <span class="sort-label">Points :</span>
    <button class="filter-btn active" data-min="0"   data-max="99999">Tous</button>
    <button class="filter-btn"        data-min="100" data-max="99999">≥ 100</button>
    <button class="filter-btn"        data-min="50"  data-max="99">50–99</button>
    <button class="filter-btn"        data-min="0"   data-max="49">&lt; 50</button>
  </div>
  <span class="results-count" id="resultsCount"></span>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <table id="rankTable">
    <thead>
      <tr>
        <th class="td-rank" data-col="rank">RANG <span class="sort-arrow">▼</span></th>
        <th class="td-change"></th>
        <th class="td-player" data-col="name">JOUEUR <span class="sort-arrow">↕</span></th>
        <th class="td-pts" data-col="points">POINTS <span class="sort-arrow">↕</span></th>
        <th class="td-t" data-col="tournaments">T. <span class="sort-arrow">↕</span></th>
        <th class="td-actions"></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <button class="modal-close" id="closeModal">×</button>
    <div class="modal-title" id="modalTitle">Modifier le joueur</div>
    <div class="form-row">
      <label class="form-label">Nom complet</label>
      <input class="form-input" id="editName" />
    </div>
    <div class="form-row">
      <label class="form-label">Points</label>
      <input class="form-input" id="editPoints" type="number" min="0" />
    </div>
    <div class="form-row">
      <label class="form-label">Tournois joués</label>
      <input class="form-input" id="editTournaments" type="number" min="0" />
    </div>
    <div class="form-actions">
      <button class="btn btn-ghost" id="cancelEdit">Annuler</button>
      <button class="btn btn-primary" id="confirmEdit">Enregistrer</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

// ── AVATAR COLORS ────────────────────────────────────────────────────────────
const AVATAR_COLORS = ['#E91E63','#FFB300','#00BCD4','#4CAF50','#FF5722','#9C27B0','#2196F3','#009688','#FF9800','#607D8B'];
const getInitials = name => { const p = name.trim().split(' '); return p.length >= 2 ? (p[0][0]+(p[p.length-1][0])).toUpperCase() : name.slice(0,2).toUpperCase(); };
const getAvatarColor = idx => AVATAR_COLORS[idx % AVATAR_COLORS.length];

// ── STATE ────────────────────────────────────────────────────────────────────
let players = INITIAL_DATA.map((p, i) => ({ ...p, _id: i, _origRank: p.rank }));
let sortCol = 'rank', sortDir = 1;
let searchQuery = '', filterMin = 0, filterMax = 99999;
let editingId = null;

// ── RANK RECALCULATION ────────────────────────────────────────────────────────
function recalcRanks() {
  // Sort by points desc, then name asc
  const sorted = [...players].sort((a,b) => b.points - a.points || a.name.localeCompare(b.name));
  let rank = 1;
  for (let i = 0; i < sorted.length; i++) {
    if (i > 0 && sorted[i].points < sorted[i-1].points) rank = i + 1;
    sorted[i].rank = rank;
  }
  // Apply back to players
  const rankMap = new Map(sorted.map(p => [p._id, p.rank]));
  players = players.map(p => ({ ...p, rank: rankMap.get(p._id) }));
}

// ── STATS ────────────────────────────────────────────────────────────────────
function updateStats() {
  const sorted = [...players].sort((a,b) => a.rank - b.rank || a.name.localeCompare(b.name));
  const top3 = sorted.slice(0,3);
  const totalPts = players.reduce((s,p) => s+p.points, 0);
  const totalT   = players.reduce((s,p) => s+p.tournaments, 0);
  const band = document.getElementById('statsBand');
  const medal = ['gold','silver','bronze'];
  band.innerHTML = `
    ${top3.map((p,i) => `
      <div class="stat-item">
        <div class="stat-val ${medal[i]}">${p.name.split(' ').pop().toUpperCase()}</div>
        <div class="stat-lbl">${['🥇 1er','🥈 2e','🥉 3e'][i]} · ${p.points} pts</div>
      </div>
      <div class="stats-divider"></div>
    `).join('')}
    <div class="stat-item">
      <div class="stat-val">${players.length}</div>
      <div class="stat-lbl">Joueurs</div>
    </div>
    <div class="stats-divider"></div>
    <div class="stat-item">
      <div class="stat-val">${totalPts.toLocaleString()}</div>
      <div class="stat-lbl">Points total</div>
    </div>
    <div class="stats-divider"></div>
    <div class="stat-item">
      <div class="stat-val">${totalT}</div>
      <div class="stat-lbl">Participations</div>
    </div>
    <div class="stats-divider"></div>
    <div class="stat-item">
      <div class="stat-val">${Math.round(totalPts/players.length)}</div>
      <div class="stat-lbl">Moy. pts</div>
    </div>
  `;
}

// ── CHART ────────────────────────────────────────────────────────────────────
function updateChart() {
  const top10 = [...players].sort((a,b) => b.points - a.points).slice(0,10);
  const maxPts = top10[0]?.points || 1;
  const wrap = document.getElementById('chartBars');
  wrap.innerHTML = top10.map((p, i) => {
    const h = Math.max(8, (p.points / maxPts) * 130);
    const col = AVATAR_COLORS[i % AVATAR_COLORS.length];
    const nameParts = p.name.trim().split(' ');
    const shortName = nameParts[nameParts.length-1];
    return `
      <div class="chart-bar-col">
        <div class="chart-bar" style="height:${h}px;background:${col};opacity:0.85" title="${p.name}: ${p.points} pts">
          <span class="chart-bar-val">${p.points}</span>
        </div>
        <div class="chart-bar-name" title="${p.name}">${shortName}</div>
      </div>
    `;
  }).join('');
}

// ── RENDER TABLE ──────────────────────────────────────────────────────────────
function getFiltered() {
  let list = [...players];
  if (searchQuery) {
    const q = searchQuery.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    list = list.filter(p => p.name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').includes(q));
  }
  list = list.filter(p => p.points >= filterMin && p.points <= filterMax);
  list.sort((a,b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    return sortDir * (va < vb ? -1 : va > vb ? 1 : 0);
  });
  return list;
}

function renderTable() {
  const list = getFiltered();
  const tbody = document.getElementById('tableBody');
  document.getElementById('resultsCount').textContent = `${list.length} joueur${list.length>1?'s':''} affiché${list.length>1?'s':''}`;

  if (!list.length) {
    tbody.innerHTML = `<tr class="empty-row"><td colspan="6">Aucun joueur trouvé</td></tr>`;
    return;
  }

  const maxPts = Math.max(...players.map(p=>p.points));

  tbody.innerHTML = list.map((p, idx) => {
    const rankDiff = p._origRank - p.rank;
    const change = rankDiff > 0 ? `<span class="change-badge change-up">▲ ${rankDiff}</span>`
                 : rankDiff < 0 ? `<span class="change-badge change-dn">▼ ${Math.abs(rankDiff)}</span>`
                 : `<span class="change-same">—</span>`;

    const rankClass = p.rank === 1 ? 'rank-1' : p.rank === 2 ? 'rank-2' : p.rank === 3 ? 'rank-3' : 'rank-other';
    const rowClass  = p.rank === 1 ? 'top1' : p.rank === 2 ? 'top2' : p.rank === 3 ? 'top3' : '';
    const avgColor  = getAvatarColor(idx);
    const initials  = getInitials(p.name);
    const nameParts = p.name.trim().split(' ');
    const firstName = nameParts[0];
    const lastName  = nameParts.slice(1).join(' ').toUpperCase();
    const barW      = Math.round((p.points / maxPts) * 100);

    return `<tr class="${rowClass}" data-id="${p._id}">
      <td class="td-rank"><span class="rank-num ${rankClass}">${p.rank}</span></td>
      <td class="td-change">${change}</td>
      <td class="td-player">
        <div class="player-cell">
          <div class="avatar" style="background:${avgColor}">${initials}</div>
          <div class="player-names">
            <div class="player-first">${firstName}</div>
            <div class="player-last">${lastName || firstName.toUpperCase()}</div>
          </div>
        </div>
      </td>
      <td class="td-pts">
        <div class="pts-badge">
          <span class="pts-num">${p.points}</span>
          <span class="pts-lbl">PTS</span>
        </div>
        <div class="pts-bar-wrap"><div class="pts-bar" style="width:${barW}%"></div></div>
      </td>
      <td class="td-t"><span class="tourn-pill">${p.tournaments}T</span></td>
      <td class="td-actions">
        <button class="btn btn-ghost btn-sm" onclick="openEdit(${p._id})">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deletePlayer(${p._id})" style="margin-left:4px">✕</button>
      </td>
    </tr>`;
  }).join('');
}

function refresh() {
  recalcRanks();
  updateStats();
  updateChart();
  renderTable();
  updateSortHeaders();
}

// ── SORT ──────────────────────────────────────────────────────────────────────
function updateSortHeaders() {
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    const col = th.dataset.col;
    th.classList.toggle('sorted', col === sortCol);
    const arrow = th.querySelector('.sort-arrow');
    if (arrow) {
      if (col === sortCol) {
        arrow.textContent = sortDir === 1 ? '▲' : '▼';
      } else {
        arrow.textContent = '↕';
      }
    }
  });
}

document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = col === 'rank' || col === 'points' ? 1 : 1; }
    renderTable(); updateSortHeaders();
  });
});

// ── SEARCH & FILTER ───────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim();
  renderTable();
  document.getElementById('resultsCount');
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterMin = +btn.dataset.min;
    filterMax = +btn.dataset.max;
    renderTable();
  });
});

// ── EDIT ──────────────────────────────────────────────────────────────────────
function openEdit(id) {
  const p = players.find(x => x._id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = `Modifier — ${p.name}`;
  document.getElementById('editName').value = p.name;
  document.getElementById('editPoints').value = p.points;
  document.getElementById('editTournaments').value = p.tournaments;
  document.getElementById('editModal').classList.add('open');
}
function closeEdit() {
  editingId = null;
  document.getElementById('editModal').classList.remove('open');
}
document.getElementById('closeModal').onclick = closeEdit;
document.getElementById('cancelEdit').onclick = closeEdit;
document.getElementById('editModal').addEventListener('click', e => {
  if (e.target === document.getElementById('editModal')) closeEdit();
});
document.getElementById('confirmEdit').onclick = () => {
  const name   = document.getElementById('editName').value.trim();
  const pts    = parseInt(document.getElementById('editPoints').value) || 0;
  const tourns = parseInt(document.getElementById('editTournaments').value) || 0;
  if (!name) { toast('⚠️ Le nom ne peut pas être vide'); return; }
  players = players.map(p => p._id === editingId ? { ...p, name, points: pts, tournaments: tourns } : p);
  closeEdit();
  refresh();
  toast('✅ Joueur modifié avec succès');
};

// ── DELETE ────────────────────────────────────────────────────────────────────
function deletePlayer(id) {
  const p = players.find(x => x._id === id);
  if (!p) return;
  if (!confirm(`Supprimer "${p.name}" du classement ?`)) return;
  players = players.filter(x => x._id !== id);
  refresh();
  toast(`🗑️ ${p.name} supprimé`);
}

// ── ADD PLAYER ────────────────────────────────────────────────────────────────
document.getElementById('toggleAdd').addEventListener('click', () => {
  const sec = document.getElementById('addSection');
  sec.classList.toggle('visible');
});

document.getElementById('addConfirm').addEventListener('click', () => {
  const name   = document.getElementById('addName').value.trim();
  const pts    = parseInt(document.getElementById('addPoints').value) || 0;
  const tourns = parseInt(document.getElementById('addTournaments').value) || 1;
  if (!name) { toast('⚠️ Entrez un nom'); return; }
  const newId = Math.max(...players.map(p=>p._id), 0) + 1;
  players.push({ _id: newId, name, points: pts, tournaments: tourns, rank: 999, _origRank: 999 });
  document.getElementById('addName').value = '';
  document.getElementById('addPoints').value = '';
  document.getElementById('addTournaments').value = '';
  refresh();
  toast(`✅ ${name} ajouté au classement`);
  document.getElementById('addSection').classList.remove('visible');
});

// ── CHART TOGGLE ──────────────────────────────────────────────────────────────
document.getElementById('toggleChart').addEventListener('click', () => {
  document.getElementById('chartSection').classList.toggle('visible');
});

// ── EXPORT CSV ────────────────────────────────────────────────────────────────
document.getElementById('exportBtn').addEventListener('click', () => {
  const sorted = [...players].sort((a,b) => a.rank - b.rank || a.name.localeCompare(b.name));
  const header = 'Rang,Joueur,Points,Tournois\n';
  const rows   = sorted.map(p => `${p.rank},"${p.name}",${p.points},${p.tournaments}`).join('\n');
  const blob   = new Blob(['\uFEFF' + header + rows], { type: 'text/csv;charset=utf-8;' });
  const url    = URL.createObjectURL(blob);
  const a      = document.createElement('a');
  a.href = url; a.download = 'palificup_classement.csv';
  a.click(); URL.revokeObjectURL(url);
  toast('⬇️ Export CSV téléchargé');
});

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeEdit();
});

// ── INIT ──────────────────────────────────────────────────────────────────────
refresh();
</script>
</body>
</html>
