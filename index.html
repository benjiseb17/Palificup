<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LA PALIFICUP — Classement Officiel</title>
<style>
:root {
  --navy:       #071423;
  --navy-hdr:   #0d2037;
  --navy-alt:   #0a1826;
  --navy-card:  #112040;
  --blue-lt:    #88b0d8;
  --blue-med:   #4a78a8;
  --blue-bright:#3a8bd4;
  --accent:     #2a7fc0;
  --gold:       #ffd040;
  --silver:     #c8c8d0;
  --bronze:     #cc7a3a;
  --white:      #ffffff;
  --text-dim:   #567090;
  --green:      #22c55e;
  --red:        #ef4444;
  --separator:  #122a44;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--navy); color: var(--white); font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; min-height: 100vh; }

/* ── HEADER ── */
.site-header {
  background: var(--navy-hdr); border-bottom: 3px solid var(--accent);
  padding: 0 24px; position: sticky; top: 0; z-index: 100;
  display: flex; align-items: center; justify-content: space-between; height: 64px;
}
.logo { display: flex; align-items: center; gap: 12px; cursor: pointer; user-select: none; }
.logo-img { height: 44px; object-fit: contain; }
.logo-fallback {
  width: 38px; height: 38px;
  background: linear-gradient(135deg, var(--gold), #e8a000);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 900; color: var(--navy);
}
.logo-text { line-height: 1.1; }
.logo-title { font-size: 18px; font-weight: 800; letter-spacing: 2px; color: var(--white); }
.logo-sub   { font-size: 10px; color: var(--blue-lt); letter-spacing: 3px; text-transform: uppercase; }

.header-actions { display: flex; gap: 10px; align-items: center; }
.admin-badge { font-size: 11px; background: var(--gold); color: var(--navy); border-radius: 4px; padding: 2px 8px; font-weight: 700; display: none; }

.btn { padding: 7px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all .18s; letter-spacing: .3px; }
.btn-ghost { background: transparent; color: var(--blue-lt); border: 1px solid var(--separator); }
.btn-ghost:hover { background: var(--navy-card); color: var(--white); }
.btn-primary { background: var(--accent); color: var(--white); }
.btn-primary:hover { background: #2070b0; }
.btn-gold { background: var(--gold); color: var(--navy); }
.btn-gold:hover { background: #e8c030; }
.btn-danger { background: #7f1d1d; color: #fca5a5; border: 1px solid #991b1b; }
.btn-danger:hover { background: #991b1b; }
.btn-sm { padding: 4px 10px; font-size: 12px; }

/* ── STATS BAND ── */
.stats-band {
  background: var(--navy-card); border-bottom: 1px solid var(--separator);
  padding: 12px 24px; display: flex; gap: 32px; align-items: center; flex-wrap: wrap;
}
.stat-item { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.stat-val { font-size: 22px; font-weight: 800; color: var(--white); line-height: 1; }
.stat-val.gold   { color: var(--gold); }
.stat-val.silver { color: var(--silver); }
.stat-val.bronze { color: var(--bronze); }
.stat-lbl { font-size: 10px; color: var(--text-dim); letter-spacing: 1.5px; text-transform: uppercase; }
.stats-divider { width: 1px; height: 36px; background: var(--separator); }

/* ── CHART ── */
.chart-section { padding: 20px 24px 0; display: none; }
.chart-section.visible { display: block; }
.chart-title { font-size: 13px; font-weight: 700; color: var(--blue-lt); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 14px; }
.chart-wrap { background: var(--navy-card); border: 1px solid var(--separator); border-radius: 10px; padding: 18px; margin-bottom: 20px; }
.chart-bars { display: flex; align-items: flex-end; gap: 8px; height: 160px; }
.chart-bar-col { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; }
.chart-bar { width: 100%; border-radius: 4px 4px 0 0; transition: height .3s; cursor: pointer; position: relative; }
.chart-bar:hover { filter: brightness(1.3); }
.chart-bar-val { font-size: 10px; font-weight: 700; color: var(--white); position: absolute; top: -18px; left: 50%; transform: translateX(-50%); white-space: nowrap; }
.chart-bar-name { font-size: 9px; color: var(--blue-lt); text-align: center; max-width: 60px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ── TOOLBAR ── */
.toolbar { padding: 16px 24px 12px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.search-wrap { flex: 1; min-width: 200px; max-width: 380px; position: relative; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }
.search-input { width: 100%; padding: 9px 12px 9px 34px; background: var(--navy-card); border: 1px solid var(--separator); border-radius: 8px; color: var(--white); font-size: 14px; outline: none; transition: border .18s; }
.search-input::placeholder { color: var(--text-dim); }
.search-input:focus { border-color: var(--accent); }
.results-count { font-size: 12px; color: var(--text-dim); margin-left: auto; }

/* ── TABLE ── */
.table-wrap { padding: 0 24px 32px; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
thead tr { background: var(--navy-hdr); border-bottom: 2px solid var(--accent); }
thead th { padding: 10px 12px; text-align: left; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--blue-lt); cursor: pointer; user-select: none; white-space: nowrap; }
thead th:hover { color: var(--white); }
thead th .sort-arrow { margin-left: 4px; opacity: .4; }
thead th.sorted .sort-arrow { opacity: 1; color: var(--gold); }

@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
tbody tr { border-bottom: 1px solid var(--separator); transition: background .12s; cursor: pointer; animation: fadeIn .15s ease forwards; }
tbody tr:nth-child(odd)  { background: var(--navy); }
tbody tr:nth-child(even) { background: var(--navy-alt); }
tbody tr:hover { background: var(--navy-card) !important; }
tbody tr.top1 { background: rgba(255,208,64,.05) !important; }
tbody tr.top2 { background: rgba(200,200,208,.04) !important; }
tbody tr.top3 { background: rgba(204,122,58,.04) !important; }
td { padding: 9px 12px; vertical-align: middle; }

.td-rank { width: 60px; text-align: center; }
.rank-num { font-size: 18px; font-weight: 900; font-family: 'Arial Black', Arial, sans-serif; line-height: 1; }
.rank-1 { color: var(--gold); } .rank-2 { color: var(--silver); } .rank-3 { color: var(--bronze); } .rank-other { color: var(--blue-med); }

.td-player { min-width: 200px; }
.player-cell { display: flex; align-items: center; gap: 12px; }
.avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 800; color: #fff; flex-shrink: 0; }
.player-names { line-height: 1.2; }
.player-first { font-size: 12px; color: var(--blue-lt); }
.player-last  { font-size: 14px; font-weight: 700; color: var(--white); }
.history-indicator { font-size: 10px; color: var(--accent); margin-left: 6px; }

.td-t { width: 110px; text-align: center; }
.tourn-pill { background: var(--separator); color: var(--blue-lt); font-size: 11px; font-weight: 700; border-radius: 12px; padding: 2px 10px; display: inline-block; }

.td-pts { width: 130px; }
.pts-badge { display: inline-flex; align-items: center; gap: 6px; background: #0d2037; border: 1px solid var(--separator); border-radius: 6px; padding: 4px 10px; }
.pts-num { font-size: 15px; font-weight: 800; color: var(--white); }
.pts-lbl { font-size: 10px; color: var(--text-dim); font-weight: 600; }
.pts-bar-wrap { height: 3px; background: var(--separator); border-radius: 2px; margin-top: 3px; width: 100%; max-width: 90px; }
.pts-bar { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--blue-bright)); }

.td-actions { width: 90px; text-align: right; }

/* ── ADD SECTION (admin) ── */
.add-section { padding: 0 24px 20px; display: none; }
.add-section.visible { display: block; }
.add-card { background: var(--navy-card); border: 1px dashed var(--accent); border-radius: 10px; padding: 20px 24px; }
.add-card-title { font-size: 13px; font-weight: 700; letter-spacing: 1px; color: var(--blue-lt); margin-bottom: 16px; text-transform: uppercase; }
.add-form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
.add-form-row .form-row { flex: 1; min-width: 140px; margin-bottom: 0; }

/* ── MODALS ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 200; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal {
  background: var(--navy-hdr); border: 1px solid var(--accent);
  border-radius: 12px; padding: 28px 32px; width: min(540px, 95vw);
  position: relative; max-height: 85vh; overflow-y: auto;
}
.modal-title { font-size: 16px; font-weight: 800; letter-spacing: 1px; margin-bottom: 4px; color: var(--gold); }
.modal-subtitle { font-size: 12px; color: var(--text-dim); margin-bottom: 20px; }
.modal-close { position: absolute; top: 14px; right: 16px; background: none; border: none; cursor: pointer; color: var(--text-dim); font-size: 20px; line-height: 1; }
.modal-close:hover { color: var(--white); }

/* ── HISTORY TABLE ── */
.history-table { width: 100%; border-collapse: collapse; }
.history-table th { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--blue-lt); padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--separator); }
.history-table td { padding: 12px 10px; font-size: 13px; border-bottom: 1px solid var(--separator); }
.history-table tr:last-child td { border-bottom: none; }
.history-rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: 50%; font-weight: 900; font-size: 13px; background: var(--navy-card); color: var(--blue-med); }
.history-rank-badge.r1 { background: rgba(255,208,64,.2); color: var(--gold); }
.history-rank-badge.r2 { background: rgba(200,200,208,.15); color: var(--silver); }
.history-rank-badge.r3 { background: rgba(204,122,58,.2); color: var(--bronze); }
.history-pts { font-weight: 800; color: var(--white); font-size: 15px; }
.modal-total { margin-top: 16px; display: flex; justify-content: space-between; padding: 12px 16px; background: var(--navy-card); border-radius: 8px; }
.modal-total-label { color: var(--text-dim); font-weight: 600; font-size: 13px; }
.modal-total-val { font-weight: 800; color: var(--gold); font-size: 16px; }
.history-empty { text-align: center; padding: 32px; color: var(--text-dim); font-size: 14px; }

/* ── EDIT MODAL FORM ── */
.form-row { margin-bottom: 16px; }
.form-label { display: block; font-size: 11px; font-weight: 700; color: var(--blue-lt); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.form-input { width: 100%; padding: 10px 14px; background: var(--navy); border: 1px solid var(--separator); border-radius: 8px; color: var(--white); font-size: 14px; outline: none; transition: border .18s; }
.form-input:focus { border-color: var(--accent); }
.form-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }

/* ── TOAST ── */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--navy-card); border: 1px solid var(--accent); border-radius: 8px; padding: 12px 20px; font-size: 13px; color: var(--white); z-index: 999; transform: translateY(80px); opacity: 0; transition: all .3s; max-width: 320px; }
.toast.show { transform: translateY(0); opacity: 1; }
.empty-row td { text-align: center; padding: 40px; color: var(--text-dim); font-size: 14px; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--navy); }
::-webkit-scrollbar-thumb { background: var(--separator); border-radius: 3px; }

@media (max-width: 640px) {
  .stats-band { gap: 16px; }
  td, th { padding: 8px 8px; }
  .toolbar { padding: 12px 12px 8px; }
  .table-wrap { padding: 0 8px 24px; }
  .site-header { padding: 0 12px; }
}
</style>
</head>

<!-- HEADER -->
<header class="site-header">
  <div class="logo" id="logoBtn" title="Classement">

</header>

<!-- STATS BAND -->

<!-- CHART -->

</div>

<!-- ADD SECTION (admin only) -->
<div class="add-section" id="addSection">

    <div class="add-card-title">Ajouter un joueur</div>

      <div class="form-row"><label class="form-label">Nom complet</label><input class="form-input" id="addName" placeholder="ex: Prénom Nom" /></div>

      <div class="form-row"><label class="form-label">Tournois</label><input class="form-input" id="addTournaments" type="number" placeholder="ex: 2" min="0" /></div>
      <div class="form-row" style="min-width:auto"><label class="form-label">&nbsp;</label><button class="btn btn-primary" id="addConfirm">Ajouter</button></div>
    </div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap">

    <input class="search-input" id="searchInput" placeholder="Rechercher un joueur…" />
  </div>
  <span class="results-count" id="resultsCount"></span>
</div>

<!-- TABLE -->
<div class="table-wrap">
  <table id="rankTable">
    <thead>
      <tr>
        <th class="td-rank" data-col="rank">RANG <span class="sort-arrow">▼</span></th>
        <th class="td-player" data-col="name">JOUEUR <span class="sort-arrow">↕</span></th>
        <th class="td-t" data-col="tournaments">TOURNOIS <span class="sort-arrow">↕</span></th>
        <th class="td-pts" data-col="points">POINTS <span class="sort-arrow">↕</span></th>
        <th class="td-actions" id="adminColHeader" style="display:none"></th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- HISTORY MODAL -->
<div class="modal-overlay" id="historyModal">
  <div class="modal">
    <button class="modal-close" id="closeHistory" aria-label="Fermer">×</button>
    <div class="modal-title" id="historyTitle"></div>
    <div class="modal-subtitle" id="historySubtitle"></div>
    <div id="historyContent"></div>
  </div>
</div>

<!-- EDIT MODAL (admin only) -->
<div class="modal-overlay" id="editModal">
  <div class="modal" style="max-width:480px">
    <button class="modal-close" id="closeModal" aria-label="Fermer">×</button>
    <div class="modal-title" id="modalTitle" style="margin-bottom:20px">Modifier le joueur</div>
    <div class="form-row"><label class="form-label">Nom complet</label><input class="form-input" id="editName" /></div>
    <div class="form-row"><label class="form-label">Points</label><input class="form-input" id="editPoints" type="number" min="0" /></div>
    <div class="form-row"><label class="form-label">Tournois joués</label><input class="form-input" id="editTournaments" type="number" min="0" /></div>
    <div class="form-actions">
      <button class="btn btn-ghost" id="cancelEdit">Annuler</button>
      <button class="btn btn-primary" id="confirmEdit">Enregistrer</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

// ── STATE ─────────────────────────────────────────────────────────────────────
const saved = localStorage.getItem('palificup_v2');
let players = saved
  ? JSON.parse(saved)
  : INITIAL_DATA.map((p, i) => ({ ...p, _id: i }));
let sortCol = 'rank', sortDir = 1, searchQuery = '', editingId = null;

function saveData() { localStorage.setItem('palificup_v2', JSON.stringify(players)); }

// ── RANK RECALCULATION ────────────────────────────────────────────────────────
function recalcRanks() {
  const sorted = [...players].sort((a,b) => b.points - a.points || a.name.localeCompare(b.name));
  let rank = 1;
  for (let i = 0; i < sorted.length; i++) {
    if (i > 0 && sorted[i].points < sorted[i-1].points) rank = i + 1;
    sorted[i].rank = rank;
  }
  const rankMap = new Map(sorted.map(p => [p._id, p.rank]));
  players = players.map(p => ({ ...p, rank: rankMap.get(p._id) }));
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function updateStats() {
  const sorted = [...players].sort((a,b) => a.rank - b.rank || a.name.localeCompare(b.name));
  const top3 = sorted.slice(0,3);
  const totalPts = players.reduce((s,p) => s+p.points, 0);
  const totalT   = players.reduce((s,p) => s+p.tournaments, 0);
  const medal = ['gold','silver','bronze'];
  document.getElementById('statsBand').innerHTML = `
    ${top3.map((p,i) => `
      <div class="stat-item">
        <div class="stat-val ${medal[i]}">${p.name.split(' ').pop().toUpperCase()}</div>
        <div class="stat-lbl">${['🥇 1er','🥈 2e','🥉 3e'][i]} · ${p.points} pts</div>
      </div><div class="stats-divider"></div>`).join('')}
    <div class="stat-item"><div class="stat-val">${players.length}</div><div class="stat-lbl">Joueurs</div></div>
    <div class="stats-divider"></div>
    <div class="stat-item"><div class="stat-val">${totalPts.toLocaleString()}</div><div class="stat-lbl">Points total</div></div>
    <div class="stats-divider"></div>
    <div class="stat-item"><div class="stat-val">${totalT}</div><div class="stat-lbl">Participations</div></div>
    <div class="stats-divider"></div>
    <div class="stat-item"><div class="stat-val">${Math.round(totalPts/players.length)}</div><div class="stat-lbl">Moy. pts</div></div>`;
}

// ── CHART ─────────────────────────────────────────────────────────────────────
function updateChart() {
  const top10 = [...players].sort((a,b) => b.points - a.points).slice(0,10);
  const maxPts = top10[0]?.points || 1;
  document.getElementById('chartBars').innerHTML = top10.map((p, i) => {
    const h = Math.max(8, (p.points / maxPts) * 130);
    const col = AVATAR_COLORS[i % AVATAR_COLORS.length];
    return `<div class="chart-bar-col">
      <div class="chart-bar" style="height:${h}px;background:${col};opacity:0.85" title="${p.name}: ${p.points} pts">
        <span class="chart-bar-val">${p.points}</span>
      </div>
      <div class="chart-bar-name" title="${p.name}">${p.name.trim().split(' ').pop()}</div>
    </div>`;
  }).join('');
}

// ── RENDER TABLE ──────────────────────────────────────────────────────────────
function getFiltered() {
  let list = [...players];
  if (searchQuery) {
    const q = searchQuery.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    list = list.filter(p => p.name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').includes(q));
  }
  list.sort((a,b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    return sortDir * (va < vb ? -1 : va > vb ? 1 : 0);
  });
  return list;
}

function renderTable() {
  const list = getFiltered();
  const tbody = document.getElementById('tableBody');
  document.getElementById('resultsCount').textContent = `${list.length} joueur${list.length>1?'s':''} affiché${list.length>1?'s':''}`;
  document.getElementById('adminColHeader').style.display = isAdmin ? '' : 'none';

  if (!list.length) { tbody.innerHTML = `<tr class="empty-row"><td colspan="5">Aucun joueur trouvé</td></tr>`; return; }

  const maxPts = players.reduce((max, p) => p.points > max ? p.points : max, 0);
  tbody.innerHTML = list.map((p, idx) => {
    const rankClass = p.rank===1?'rank-1':p.rank===2?'rank-2':p.rank===3?'rank-3':'rank-other';
    const rowClass  = p.rank===1?'top1':p.rank===2?'top2':p.rank===3?'top3':'';
    const color     = getAvatarColor(idx);
    const nameParts = p.name.trim().split(' ');
    const barW      = Math.round((p.points / maxPts) * 100);
    const hasHistory = p.history && p.history.length > 0;
    const adminCells = isAdmin ? `<td class="td-actions" style="text-align:right">
      <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();openEdit(${p._id})" aria-label="Modifier ${p.name}">✏️</button>
      <button class="btn btn-danger btn-sm" onclick="event.stopPropagation();deletePlayer(${p._id})" style="margin-left:4px" aria-label="Supprimer ${p.name}">✕</button>
    </td>` : '';

    return `<tr class="${rowClass}" onclick="openHistory(${p._id})" title="Voir l'historique de ${p.name}">
      <td class="td-rank"><span class="rank-num ${rankClass}">${p.rank}</span></td>
      <td class="td-player">
        <div class="player-cell">
          <div class="avatar" style="background:${color}">${getInitials(p.name)}</div>
          <div class="player-names">
            <div class="player-first">${nameParts[0]}</div>
            <div class="player-last">${nameParts.slice(1).join(' ').toUpperCase() || nameParts[0].toUpperCase()}</div>
          </div>
          ${hasHistory ? '<span class="history-indicator">📋</span>' : ''}
        </div>
      </td>
      <td class="td-t"><span class="tourn-pill">${p.tournaments} tournoi${p.tournaments>1?'s':''}</span></td>
      <td class="td-pts">
        <div class="pts-badge"><span class="pts-num">${p.points}</span><span class="pts-lbl">PTS</span></div>
        <div class="pts-bar-wrap"><div class="pts-bar" style="width:${barW}%"></div></div>
      </td>
      ${adminCells}
    </tr>`;
  }).join('');
}

function refresh() { recalcRanks(); saveData(); updateStats(); updateChart(); renderTable(); updateSortHeaders(); }

// ── SORT ──────────────────────────────────────────────────────────────────────
function updateSortHeaders() {
  document.querySelectorAll('thead th[data-col]').forEach(th => {
    const col = th.dataset.col;
    th.classList.toggle('sorted', col === sortCol);
    const arrow = th.querySelector('.sort-arrow');
    if (arrow) arrow.textContent = col === sortCol ? (sortDir===1?'▲':'▼') : '↕';
  });
}
document.querySelectorAll('thead th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = 1; }
    renderTable(); updateSortHeaders();
  });
});

// ── SEARCH ────────────────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value.trim(); renderTable();
});

// ── HISTORY MODAL ─────────────────────────────────────────────────────────────
function openHistory(id) {
  const p = players.find(x => x._id === id);
  if (!p) return;
  const medal = p.rank===1?'🥇':p.rank===2?'🥈':p.rank===3?'🥉':'🎯';
  document.getElementById('historyTitle').textContent = p.name;
  document.getElementById('historySubtitle').textContent = `${medal} Rang #${p.rank} · ${p.points} pts au total · ${p.tournaments} tournoi${p.tournaments>1?'s':''}`;

  const content = document.getElementById('historyContent');
  if (!p.history || p.history.length === 0) {
    content.innerHTML = `<div class="history-empty">📭 Aucun historique détaillé disponible pour ce joueur.<br><span style="font-size:12px">Active le mode admin pour saisir les résultats par tournoi.</span></div>`;
  } else {
    const rows = p.history.map(h => {
      const t = TOURNAMENTS.find(x => x.id === h.tournamentId) || { name: h.tournamentId, date: '' };
      const rc = h.rank===1?'r1':h.rank===2?'r2':h.rank===3?'r3':'';
      return `<tr>
        <td><strong>${t.name}</strong>${t.date?`<br><span style="font-size:11px;color:var(--text-dim)">${t.date}</span>`:''}></td>
        <td><span class="history-rank-badge ${rc}">${h.rank}</span></td>
        <td><span class="history-pts">${h.points}</span> <span style="font-size:11px;color:var(--text-dim)">pts</span></td>
      </tr>`;
    }).join('');
    content.innerHTML = `
      <table class="history-table">
        <thead><tr><th>Tournoi</th><th>Classement</th><th>Points</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="modal-total">
        <span class="modal-total-label">Total cumulé</span>
        <span class="modal-total-val">${p.points} pts</span>
      </div>`;
  }
  document.getElementById('historyModal').classList.add('open');
}
function closeHistory() { document.getElementById('historyModal').classList.remove('open'); }
document.getElementById('closeHistory').onclick = closeHistory;
document.getElementById('historyModal').addEventListener('click', e => { if (e.target === document.getElementById('historyModal')) closeHistory(); });

// ── EDIT (admin) ──────────────────────────────────────────────────────────────
function openEdit(id) {
  if (!isAdmin) return;
  const p = players.find(x => x._id === id);
  if (!p) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = `Modifier — ${p.name}`;
  document.getElementById('editName').value = p.name;
  document.getElementById('editPoints').value = p.points;
  document.getElementById('editTournaments').value = p.tournaments;
  document.getElementById('editModal').classList.add('open');
  setTimeout(() => document.getElementById('editName').focus(), 50);
}
function closeEdit() { editingId = null; document.getElementById('editModal').classList.remove('open'); }
document.getElementById('closeModal').onclick = closeEdit;
document.getElementById('cancelEdit').onclick = closeEdit;
document.getElementById('editModal').addEventListener('click', e => { if (e.target === document.getElementById('editModal')) closeEdit(); });
document.getElementById('confirmEdit').onclick = () => {
  const name = document.getElementById('editName').value.trim();
  const pts  = parseInt(document.getElementById('editPoints').value) || 0;
  const t    = parseInt(document.getElementById('editTournaments').value) || 0;
  if (!name) { toast('⚠️ Le nom ne peut pas être vide'); return; }
  players = players.map(p => p._id === editingId ? { ...p, name, points: pts, tournaments: t } : p);
  closeEdit(); refresh(); toast('✅ Joueur modifié avec succès');
};

// ── DELETE (admin) ────────────────────────────────────────────────────────────
function deletePlayer(id) {
  if (!isAdmin) return;
  const p = players.find(x => x._id === id);
  if (!p || !confirm(`Supprimer "${p.name}" du classement ?`)) return;
  players = players.filter(x => x._id !== id);
  refresh(); toast(`🗑️ ${p.name} supprimé`);
}

// ── ADD (admin) ────────────────────────────────────────────────────────────────
document.getElementById('toggleAdd').addEventListener('click', () => document.getElementById('addSection').classList.toggle('visible'));
document.getElementById('addConfirm').addEventListener('click', () => {
  const name = document.getElementById('addName').value.trim();
  const pts  = parseInt(document.getElementById('addPoints').value) || 0;
  const t    = parseInt(document.getElementById('addTournaments').value) || 1;
  if (!name) { toast('⚠️ Entrez un nom'); return; }
  const newId = players.reduce((max, p) => p._id > max ? p._id : max, 0) + 1;
  players.push({ _id: newId, name, points: pts, tournaments: t, rank: 999, history: [] });
  document.getElementById('addName').value = '';
  document.getElementById('addPoints').value = '';
  document.getElementById('addTournaments').value = '';
  refresh(); toast(`✅ ${name} ajouté`);
  document.getElementById('addSection').classList.remove('visible');
});

// ── CHART TOGGLE ──────────────────────────────────────────────────────────────
document.getElementById('toggleChart').addEventListener('click', () => document.getElementById('chartSection').classList.toggle('visible'));

// ── EXPORT CSV ────────────────────────────────────────────────────────────────
document.getElementById('exportBtn').addEventListener('click', () => {
  const sorted = [...players].sort((a,b) => a.rank - b.rank || a.name.localeCompare(b.name));
  const csv = 'Rang,Joueur,Points,Tournois\n' + sorted.map(p => `${p.rank},"${p.name}",${p.points},${p.tournaments}`).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8;'}));
  a.download = 'palificup_classement.csv';
  a.click(); toast('⬇️ Export CSV téléchargé');
});

// ── TOAST ─────────────────────────────────────────────────────────────────────
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

// ── KEYBOARD ──────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeEdit(); closeHistory(); } });

// ── INIT ──────────────────────────────────────────────────────────────────────
refresh();
</script>
</body>
</html>
